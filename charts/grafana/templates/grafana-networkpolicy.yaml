################################
## Grafana NetworkPolicy
################################
{{- if or (eq .Values.global.plane.mode "control") (eq .Values.global.plane.mode "unified") }}
{{- if .Values.global.features.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ template "grafana.fullname" . }}-policy
  labels:
    tier: monitoring
    component: grafana-policy
    chart: {{ template "grafana.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
spec:
  podSelector:
    matchLabels:
      tier: monitoring
      component: grafana
      release: {{ .Release.Name }}
  policyTypes:
  - Ingress
  ingress:
  - from:
    {{- if .Values.global.features.authSidecar.enabled }}
    - namespaceSelector:
        matchLabels:
          network.openshift.io/policy-group: ingress
    {{- if .Values.global.features.authSidecar.ingressAllowedNamespaces }}
    - namespaceSelector:
        matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values: {{ .Values.global.features.authSidecar.ingressAllowedNamespaces | toJson }}
    {{- end }}
    {{- else }}
    - podSelector:
        matchLabels:
          tier: nginx
          component: cp-ingress-controller
          release: {{ .Release.Name }}
    {{- end }}
    ports:
    {{- if .Values.global.features.authSidecar.enabled }}
    - protocol: TCP
      port: {{ .Values.global.features.authSidecar.port }}
    {{- else }}
    - protocol: TCP
      port: {{ .Values.ports.http }}
    {{- end }}
{{- end }}
{{- end }}
