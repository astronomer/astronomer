####################################
## Grafana Bootstrap Role Binding ##
####################################
{{- if or (eq .Values.global.plane.mode "control") (eq .Values.global.plane.mode "unified") }}
{{- if and .Values.global.rbac.enabled (and (not .Values.backendSecretName) (not .Values.backendConnection)) }}
kind: RoleBinding
apiVersion: {{ template "apiVersion.rbac" . }}
metadata:
  name: {{ template "grafana.fullname" . }}-bootstrapper
  labels:
    {{- include "global.labels" . | nindent 4 }}
    tier: grafana
    chart: {{ template "grafana.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ template "grafana.fullname" . }}-bootstrapper
subjects:
  - kind: ServiceAccount
    name: {{ template "grafana.bootstrapper.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
