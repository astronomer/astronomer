# Default values for Grafana.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

nodeSelector: {}
affinity: {}
tolerations: []

replicas: 1

images:
  grafana:
    repository: quay.io/astronomer/ap-grafana
    tag: 12.4.5
    pullPolicy: IfNotPresent
  dbBootstrapper:
    repository: quay.io/astronomer/ap-db-bootstrapper
    tag: 2.0.12
    pullPolicy: IfNotPresent

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true
  runAsUser: 65532

# ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

serviceAccount:
  # ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/
  automountServiceAccountToken: true
  # Specifies whether a ServiceAccount should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the ServiceAccount to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ~

backendSecretName: ~
backendConnection:
  {}
  # user: ~
  # pass: ~
  # host: ~
  # port: ~
  # db: ~

ports:
  http: 3000

resources: {}
#  limits:
#   cpu: 100m
#   memory: 128Mi
#  requests:
#   cpu: 100m
#   memory: 128Mi

## Configure grafana dashboard to import
## NOTE: To use dashboards you must also enable/configure dashboardProviders
## ref: https://grafana.com/dashboards
##
## dashboards per provider, use provider name as key.
##
dashboards:
  {}
  # default:
  #   some-dashboard:
  #     json: |
  #       $RAW_JSON
  #   custom-dashboard:
  #     file: dashboards/custom-dashboard.json


## Configure extra environment variables for grafana.
## This allows you to change configuration settings
## within grafana such as SMTP configuration for alerts.
extraEnvVars:
  []
  # - name: GF_SMTP_ENABLED
  #   value: "true"
  # - name: GF_SMTP_HOST
  #   value: smtp.astronomer.io
  # - name: GF_SMTP_USER
  #   value: grafana
  # - name: GF_SMTP_PASSWORD
  #   valueFrom:
  #     secretKeyRef:
  #       name: grafana-smtp-secret
  #       key: smtp_password

startupProbe: {}

authProxy:
  startupProbe: {}

bootstrapper:
  # ap-db-bootstrapper runs as UID 1000; override the chart-wide runAsUser default for this init container.
  securityContext:
    runAsUser: 1000
  readinessProbe: {}
  livenessProbe: {}

waitForDB:
  readinessProbe: {}
  livenessProbe: {}

podAnnotations: {}
