images:
  manager:
    # TODO: Change it to public image once 1.6.0 is released
    repository: quay.io/astronomer/airflow-operator-dev
    tag: 1.6.0-rc3
    pullPolicy: IfNotPresent
# Whether the chart should create the Airflow Operator CRDs. Set to false if the CRDs are managed
# out-of-band (e.g. installed separately by a cluster admin or via GitOps).
crd:
  create: true

certManager:
  enabled: false


# Restrict the Airflow Operator to only send network requests to Kubernetes API, and read available astro-runtime versions from a local file instead of retrieving it dynamically online.
airgapped: false

# The distribution the Operator is running in, surfaced to the manager as the AIRFLOW_OPERATOR_ENVIRONMENT
# env var. Valid values: "standalone", "apc", "astro", "local".
environment: apc

runtimeVersions:
  configMapName: ""
  versionsJson: ""

# When true, the operator will accept Airflow CRs that reference deprecated
# astro-runtime versions (sets the ALLOW_DEPRECATED_RUNTIME_VERSIONS env var).
allowDeprecatedRuntimeVersions: true

terminationGracePeriodSeconds: 10
webhooks:

  # Enables the webhook service for mutating and validating configurations.
  enabled: true
  useCustomTlsCerts: false
  certSecretName: "webhook-server-cert"
  customCertsSecretName: "webhooks-tls-certs"
  # for each of the following properties, the full certificate/key/CABundle should be provided in the following way:
  # caBundle: |
  #  -----BEGIN CERTIFICATE-----
  #  .......................
  #  -----END CERTIFICATE-----
  caBundle: ""
  tlsCert: ""
  tlsKey: ""

serviceAccount:
  create: true
  # Override the name of the controller-manager ServiceAccount.
  # Leave empty to use the default "airflow-operator-controller-manager".
  name: ""
  # Whether the ServiceAccount's API token is automatically mounted into the pod.
  automountServiceAccountToken: true
  # Extra annotations to add to the ServiceAccount (e.g. for cloud IAM role binding).
  annotations: {}

manager:
  replicas: 1
  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
  metrics:
    enabled: false
  resources:
    limits:
      cpu: 600m
      memory: 500Mi
    requests:
      cpu: 500m
      memory: 250Mi
  env: []
  livenessProbe: {}
    # httpGet:
    #     path: /healthz
    #     port: .Values.port.managerPort
    # initialDelaySeconds: 15
    # periodSeconds: 20
  readinessProbe: {}
    # httpGet:
    #     path: /readyz
    #     port: .Values.port.managerPort
    # initialDelaySeconds: 5
    # periodSeconds: 10
  nodeSelector: {}
  # affinity: node/pod (anti-)affinity rules, e.g. spread replicas across nodes.
  affinity: {}
  tolerations: []

ports:
  managerPort: 8081
  managerContainerPort: 8443
  managerUpstreamPort: 8080
  webhookServiceTargetPort: 9443
  webhookServicePort: 443

podAnnotations: {}
