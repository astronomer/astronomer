images:
  manager:
    # TODO: Change it to public image once 1.6.0 is released
    repository: quay.io/astronomer/airflow-operator-dev
    tag: 1.6.0-rc2
    pullPolicy: IfNotPresent

crd:
  create: false
certManager:
  enabled: false

airgapped: false

runtimeVersions:
  configMapName: ""
  versionsJson: ""

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true

# TODO(PINF-713): set securityContext.runAsUser once the airflow-operator image's
# non-root UID is confirmed (private repo; could not be resolved anonymously).
podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

terminationGracePeriodSeconds: 10
webhooks:

  # Enables the webhook service for mutating and validating configurations.
  enabled: true
  useCustomTlsCerts: false
  certSecretName: "webhook-server-cert"
  customCertsSecretName: "webhooks-tls-certs"
  # for each of the following properties, the full certificate/key/CABundle should be provided in the following way:
  # caBundle: |
  #  -----BEGIN CERTIFICATE-----
  #  .......................
  #  -----END CERTIFICATE-----
  caBundle: ""
  tlsCert: ""
  tlsKey: ""
manager:
  replicas: 1
  metrics:
    enabled: false
  resources:
    limits:
      cpu: 600m
      memory: 500Mi
    requests:
      cpu: 500m
      memory: 250Mi
  env: []

serviceAccount:
  # ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/
  automountServiceAccountToken: true
  create: true
  annotations: {}
  name: ""
livenessProbe: {}
  # httpGet:
  #     path: /healthz
  #     port: .Values.port.managerPort
  # initialDelaySeconds: 15
  # periodSeconds: 20
readinessProbe: {}
  # httpGet:
  #     path: /readyz
  #     port: .Values.port.managerPort
  # initialDelaySeconds: 5
  # periodSeconds: 10

ports:
  managerPort: 8081
  managerContainerPort: 8443
  managerUpstreamPort: 8080
  webhookServiceTargetPort: 9443
  webhookServicePort: 443

podAnnotations: {}

nodeSelector: {}
affinity: {}
tolerations: []
