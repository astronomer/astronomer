{{ define "webhooks.clientConfig" -}}
{{ printf "\n" }}
{{- if .Values.webhooks.useCustomTlsCerts -}}
caBundle: "{{ .Values.webhooks.caBundle | b64enc }}"
{{ end -}}
service:
  name: {{ .Release.Name }}-airflow-operator-webhook-service
  namespace: '{{ .Release.Namespace }}'
  path: '{{ .path }}'
{{- end }}

# Declaring volumes for the Operator manager deployment, either use Certmanager-provided
{{ define "manager.volumes" -}}
{{ printf "\n" -}}
{{- if and .Values.airgapped .Values.runtimeVersions.configMapName -}}
- name: versions
  configMap:
    name: {{ .Values.runtimeVersions.configMapName }}
{{- end }}
{{ if and .Values.certManager.enabled (not .Values.webhooks.useCustomTlsCerts) -}}
- name: cert
  secret:
    defaultMode: 420
    secretName: {{ .Values.webhooks.certSecretName }}
{{- else -}}
- name: custom-certs
  secret:
    defaultMode: 420
    secretName: {{ .Values.webhooks.customCertsSecretName }}
{{- end -}}
{{- end }}

{{ define "manager.volumeMounts" -}}
{{ printf "\n" -}}
{{- if and .Values.airgapped .Values.runtimeVersions.configMapName -}}
- mountPath: /etc/config/astro-runtime/metadata/versions.json
  name: versions
  subPath: versions.json
{{- end }}
{{ if and .Values.certManager.enabled (not .Values.webhooks.useCustomTlsCerts) -}}
- mountPath: /tmp/k8s-webhook-server/serving-certs
  name: cert
  readOnly: true
{{- else -}}
- mountPath: /tmp/custom-certs
  name: custom-certs
  readOnly: true
{{- end -}}
{{- end }}

{{ define "manager.args" -}}
{{ printf "\n" -}}
- --health-probe-bind-address=:{{ .Values.ports.managerPort }}
- --leader-elect
{{ if .Values.manager.metrics.enabled }}
- --metrics-bind-address=127.0.0.1:{{ .Values.ports.managerUpstreamPort }}
{{- end -}}
{{- if .Values.airgapped }}
- --airgapped
{{- end -}}
{{- if .Values.global.openshift.enabled }}
- --openshift
{{- end -}}
{{- if .Values.kedaEnabled }}
- --keda
{{- end -}}
{{- end }}

{{ define "manager.containers" -}}
- args: {{ include "manager.args" . | indent 2 }}
  command:
    - /manager
  env:
    - name: WEBHOOK_CERT_DIRECTORY
      value: '{{- if .Values.webhooks.useCustomTlsCerts -}}/tmp/custom-certs{{- else -}}{{- end -}}'
{{- if .Values.allowDeprecatedRuntimeVersions }}
    - name: ALLOW_DEPRECATED_RUNTIME_VERSIONS
      value: "true"
{{- end }}
{{- if .Values.environment }}
    - name: AIRFLOW_OPERATOR_ENVIRONMENT
      value: {{ .Values.environment | quote }}
{{- end }}
{{- range $i, $config := .Values.manager.env }}
    - name: {{ $config.name }}
      value: {{ $config.value | quote }}
{{- end }}
  image: {{ include "operator.image" . }}
  imagePullPolicy: {{ .Values.images.manager.pullPolicy }}
  {{- if .Values.manager.livenessProbe }}
  livenessProbe: {{ tpl (toYaml .Values.manager.livenessProbe) . | nindent 4 }}
  {{- else }}
  livenessProbe:
    httpGet:
      path: /healthz
      port: {{ .Values.ports.managerPort }}
  {{- end }}
  name: manager
  {{- if .Values.manager.readinessProbe }}
  readinessProbe: {{- tpl (toYaml .Values.manager.readinessProbe) . | nindent 4 }}
  {{- else }}
  readinessProbe:
    httpGet:
      path: /readyz
      port: {{ .Values.ports.managerPort }}
  {{- end }}
  resources:
    limits:
      cpu: '{{ .Values.manager.resources.limits.cpu }}'
      memory: '{{ .Values.manager.resources.limits.memory }}'
    requests:
      cpu: '{{ .Values.manager.resources.requests.cpu }}'
      memory: '{{ .Values.manager.resources.requests.memory }}'
  securityContext:
    {{- $required := dict "readOnlyRootFilesystem" true }}
    {{- merge $required .Values.manager.securityContext | toYaml | nindent 4 }}
  volumeMounts: {{ include "manager.volumeMounts" . | nindent 2 }}
{{- end }}

{{/*
Name of the controller-manager ServiceAccount. Defaults to
"airflow-operator-controller-manager" name; override via serviceAccount.name.
*/}}
{{- define "operator.serviceAccountName" -}}
{{- if and .Values.serviceAccount.create .Values.global.rbac.enabled -}}
    {{- default (printf "%s-airflow-operator-controller-manager" .Release.Name) .Values.serviceAccount.name }}
{{- else -}}
    {{- default "default" .Values.serviceAccount.name }}
{{- end -}}
{{- end -}}

{{ define "operator.image" -}}
{{- if .Values.global.privateRegistry.enabled -}}
{{ .Values.global.privateRegistry.repository }}/airflow-operator-dev:{{ .Values.images.manager.tag }}
{{- else -}}
{{ .Values.images.manager.repository }}:{{ .Values.images.manager.tag }}
{{- end }}
{{- end }}

{{/*
Create chart name and version as used by the chart label.
*/}}
{{- define "operator.chart" -}}
{{- printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" -}}
{{- end -}}

{{/*
Whether airflow-operator resources should render: the operator must be enabled
and the plane mode must be data or unified.
*/}}
{{- define "operator.enabled" -}}
{{- if and (or (eq .Values.global.plane.mode "data") (eq .Values.global.plane.mode "unified")) .Values.global.airflowOperator.enabled -}}
true
{{- end -}}
{{- end -}}

{{/*
Return the proper Docker Image Registry Secret Names
*/}}
{{- define "manager.imagePullSecrets" -}}
{{- if and .Values.global.privateRegistry.enabled .Values.global.privateRegistry.secretName }}
imagePullSecrets:
  - name: {{ .Values.global.privateRegistry.secretName }}
{{- else if .Values.manager.imagePullSecrets }}
imagePullSecrets:
{{- toYaml .Values.manager.imagePullSecrets | nindent 2 }}
{{- end -}}
{{- end -}}
