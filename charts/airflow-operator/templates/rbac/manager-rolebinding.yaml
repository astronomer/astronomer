{{- if (include "operator.enabled" .) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-airflow-operator-manager-rolebinding
  namespace: '{{ .Release.Namespace }}'
  labels:
    tier: operator
    release: {{ .Release.Name }}
    chart: {{ template "operator.chart" . }}
    heritage: {{ .Release.Service }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-airflow-operator-manager-role
subjects:
- kind: ServiceAccount
  name: '{{ template "operator.serviceAccountName" $ }}'
  namespace: '{{ $.Release.Namespace }}'
{{- end }}
