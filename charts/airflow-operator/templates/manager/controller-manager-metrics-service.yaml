{{- if (include "operator.enabled" .) }}
{{ if .Values.manager.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  labels:
    tier: operator
    component: controller-manager
    chart: {{ template "operator.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
    astronomer.io/platform-release: {{ .Release.Name }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "{{ .Values.ports.managerUpstreamPort }}"

  name: {{ .Release.Name }}-aocm-metrics-service
  namespace: '{{ .Release.Namespace }}'

spec:
  type: ClusterIP
  ports:
  - name: metrics
    port: {{ .Values.ports.managerUpstreamPort }}
    targetPort: {{ .Values.ports.managerUpstreamPort }}
    appProtocol: http
    protocol: TCP
  selector:
    component: controller-manager
{{- end }}
{{- end }}
