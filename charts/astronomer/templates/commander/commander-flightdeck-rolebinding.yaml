#######################################
## Commander Flightdeck Role Binding ##
#######################################
{{- if and .Values.global.rbac.enabled (not .Values.global.clusterRoles )}}
{{- if (include "flightdeck.enabled" .) }}
{{- $commanderServiceAccountName := ( include "commander.serviceAccountName" . )  }}
kind: RoleBinding
apiVersion: {{ template "apiVersion.rbac" . }}
metadata:
  name: {{ .Release.Name }}-flightdeck-rolebinding
  labels:
    tier: astronomer
    component: commander
    release: {{ .Release.Name }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    heritage: {{ .Release.Service }}
    plane: {{ .Values.global.plane.mode }}
  {{ if .Values.global.argoCD.annotation.enabled }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-flightdeck-role
subjects:
  - kind: ServiceAccount
    name: {{ $commanderServiceAccountName }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
