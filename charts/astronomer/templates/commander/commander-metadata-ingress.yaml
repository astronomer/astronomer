################################
## Commander Metadata Ingress ##
################################
{{- if and (eq .Values.global.plane.mode "data") .Values.global.plane.domainPrefix }}
kind: Ingress
apiVersion: {{ template "apiVersion.Ingress" . }}
metadata:
  name: {{ .Release.Name }}-commander-metadata-ingress
  labels:
    component: metadata-ingress
    tier: astronomer
    release: {{ .Release.Name }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    heritage: {{ .Release.Service }}
    plane: dataplane
  annotations:
    {{- if .Values.global.authSidecar.enabled  }}
{{- toYaml .Values.global.extraAnnotations | nindent 4 }}
    {{- else }}
    kubernetes.io/ingress.class: "{{ .Release.Name }}-nginx"
    {{- if .Values.global.extraAnnotations }}
{{- toYaml .Values.global.extraAnnotations | nindent 4 }}
    {{- end }}
    nginx.ingress.kubernetes.io/custom-http-errors: "404"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/rewrite-target: /metadata
    {{- end }}
    {{- if .Values.commander.ingress.annotation  }}
    {{- toYaml .Values.commander.ingress.annotation  | nindent 4  }}
    {{- end }}
spec:
  {{- if .Values.global.ingressClassName }}
  ingressClassName: {{ .Values.global.ingressClassName }}
  {{- else if .Values.global.extraAnnotations }}
  ingressClassName: {{ index .Values.global.extraAnnotations "kubernetes.io/ingress.class" | default (printf "%s-nginx" .Release.Name) }}
  {{- else }}
  ingressClassName: "{{ .Release.Name }}-nginx"
  {{- end }}
  {{- if .Values.global.tlsSecret }}
  tls:
    - secretName: {{ .Values.global.tlsSecret }}
      hosts:
        - {{ include "commander.baseDomain" . }}
  {{- end }}
  rules:
  - host: {{ include "commander.baseDomain" . }}
    http:
      paths:
        - path: /metadata
          pathType: Prefix
          backend:
            service:
              name: {{ .Release.Name }}-commander
              port:
                name: commander-http
{{- end }}
