##############################
## Commander Flighdeck Role ##
##############################
{{- if .Values.global.rbac.enabled }}
{{- if (include "flightdeck.enabled" .) }}
kind: Role
apiVersion: {{ template "apiVersion.rbac" . }}
metadata:
  name: {{ .Release.Name }}-flightdeck-role
  labels:
    tier: astronomer
    component: commander
    release: {{ .Release.Name }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    heritage: {{ .Release.Service }}
    plane: {{ .Values.global.plane.mode }}
  {{ if .Values.global.argoCD.annotation.enabled }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  {{- end }}
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - list
      - get
      - create
      - patch
{{- end }}
{{- end }}
