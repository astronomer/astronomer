{{- if .Values.global.istioEnabled }}
{{- $istioNamespace := .Values.global.istio.gateway | regexFind "^[^/]+" }}
# The default sidecar configuration will apply to the Airflow namespaces.
# Note: This is only needed if you're using Istio service mesh with sidecar injection.
# For gateway-only deployments, sidecar injection is not required.
apiVersion: {{ template "apiVersion.istio.networking" . }}
kind: Sidecar
metadata:
  name: {{ .Release.Namespace }}-sidecar-config
  namespace: {{ .Release.Namespace }}
  labels:
    component: istio-sidecar
    tier: astronomer
    release: {{ .Release.Name }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    heritage: {{ .Release.Service }}
spec:
  egress:
  - hosts:
    # allow egress traffic to pods in the same namespace
    - "./*"
    # allow egress traffic to pods in istio-system
    - "{{ $istioNamespace }}/*"
    # allow egress traffic to kube-system pods
    - "kube-system/*"
---
# Prometheus needs broader egress for scraping metrics
apiVersion: {{ template "apiVersion.istio.networking" . }}
kind: Sidecar
metadata:
  name: {{ .Release.Namespace }}-prometheus-sidecar-config
  namespace: {{ .Release.Namespace }}
  labels:
    component: istio-sidecar
    tier: astronomer
    release: {{ .Release.Name }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    heritage: {{ .Release.Service }}
spec:
  workloadSelector:
    labels:
      component: prometheus
  egress:
  - hosts:
    # allow egress traffic everywhere for metrics scraping
    - "*/*"
{{- end }}
