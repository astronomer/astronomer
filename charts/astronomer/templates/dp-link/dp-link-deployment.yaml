###################################
## Astronomer DP-Link Deployment ##
###################################
{{- if or .Values.dpLink.enabled (and .Values.global.dataPlaneFailover.enabled (eq .Values.global.plane.mode "control")) }}
{{- if or (eq .Values.global.plane.mode "control") (eq .Values.global.plane.mode "unified") }}
kind: Deployment
apiVersion: apps/v1
metadata:
  name: {{ .Release.Name }}-dp-link
  labels:
    component: dp-link
    tier: astronomer
    release: {{ .Release.Name }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    heritage: {{ .Release.Service }}
    plane: {{ .Values.global.plane.mode }}
spec:
  replicas: {{ .Values.dpLink.replicas }}
  selector:
    matchLabels:
      tier: astronomer
      component: dp-link
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        tier: astronomer
        component: dp-link
        release: {{ .Release.Name }}
        app: dp-link
        version: {{ .Chart.Version }}
        plane: {{ .Values.global.plane.mode }}
        {{- include "global.podLabels" . | nindent 8 }}
      annotations:
        {{- if .Values.global.podAnnotations }}
        {{- toYaml .Values.global.podAnnotations | nindent 8 }}
        {{- end }}
        {{- if .Values.dpLink.podAnnotations }}
        {{- toYaml .Values.dpLink.podAnnotations | nindent 8 }}
        {{- end }}
    spec:
      nodeSelector: {{- toYaml (default .Values.global.platformNodePool.nodeSelector .Values.nodeSelector) | nindent 8 }}
      affinity: {{- toYaml (default .Values.global.platformNodePool.affinity .Values.affinity) | nindent 8 }}
      tolerations: {{- toYaml (default .Values.global.platformNodePool.tolerations .Values.tolerations) | nindent 8 }}
      restartPolicy: Always
      serviceAccountName: {{ template "dpLink.serviceAccountName" . }}
      {{- include "astronomer.imagePullSecrets" . | nindent 6 }}
      initContainers:
        - name: etc-ssl-certs-copier
          command:
            - sh
            - -c
            - |
              if [ -d /etc/ssl/certs ]; then
                cp -r /etc/ssl/certs/* /etc/ssl/certs_copy/
              else
                echo "No /etc/ssl/certs directory found, skipping copy."
              fi
          volumeMounts:
            - name: etc-ssl-certs
              mountPath: /etc/ssl/certs_copy
          image: {{ template "houston.image" . }}
          imagePullPolicy: {{ .Values.images.houston.pullPolicy }}
          securityContext:
            {{- $required := dict "readOnlyRootFilesystem" true }}
            {{- merge $required .Values.securityContext | toYaml | nindent 12 }}
          resources: {{- toYaml .Values.dpLink.resources | nindent 12 }}
      containers:
        - name: dp-link
          image: {{ template "houston.image" . }}
          imagePullPolicy: {{ .Values.images.houston.pullPolicy }}
          securityContext:
            {{- $required := dict "readOnlyRootFilesystem" true }}
            {{- merge $required .Values.securityContext | toYaml | nindent 12 }}
          resources: {{- toYaml .Values.dpLink.resources | nindent 12 }}
          volumeMounts:
            {{- include "houston_volume_mounts" . | indent 12 }}
            {{- include "custom_ca_volume_mounts" . | indent 12 }}
            - name: etc-ssl-certs
              mountPath: /etc/ssl/certs
            - name: tmp
              mountPath: /tmp
            {{- if .Values.dpLink.volumeMounts }}
            {{- tpl (toYaml .Values.dpLink.volumeMounts) $ | nindent 12 }}
            {{- end }}
          command:
            - /houston/bin/entrypoint
          args:
            - yarn
            - run
            - dplink
          {{- if .Values.dpLink.args }}
          args: {{- toYaml .Values.dpLink.args | nindent 12 }}
          {{- end }}
          env:
            {{- include "dp_link_environment" . | nindent 12 }}
            {{- if .Values.dpLink.prismaConnectionLimit }}
            - name: PRISMA_CONNECTION_LIMIT
              value: {{ .Values.dpLink.prismaConnectionLimit | quote }}
            {{- end }}
            - name: DB_NAME
              value: {{ .Release.Name }}-houston
            - name: NAMESPACE
              value: {{ .Release.Namespace }}
            # Claim loop configuration
            - name: CLAIM_INTERVAL_SECONDS
              value: {{ .Values.dpLink.claimIntervalSeconds | quote }}
            # Owner loop configuration
            - name: LEASE_RENEWAL_INTERVAL_SECONDS
              value: {{ .Values.dpLink.leaseRenewalIntervalSeconds | quote }}
            - name: LEASE_DURATION_SECONDS
              value: {{ .Values.dpLink.leaseDurationSeconds | quote }}
            # Heartbeat configuration
            - name: UNREACHABLE_THRESHOLD_SECONDS
              value: {{ .Values.dpLink.unreachableThresholdSeconds | quote }}
            - name: DEGRADED_THRESHOLD_SECONDS
              value: {{ .Values.dpLink.degradedThresholdSeconds | quote }}
            # Stream reconnect configuration
            - name: RECONNECT_MAX_ATTEMPTS
              value: {{ .Values.dpLink.reconnectMaxAttempts | quote }}
            - name: INITIAL_RECONNECT_DELAY_SECONDS
              value: {{ .Values.dpLink.initialReconnectDelaySeconds | quote }}
            - name: MAX_RECONNECT_DELAY_SECONDS
              value: {{ .Values.dpLink.maxReconnectDelaySeconds | quote }}
            - name: RECONNECT_DELAY_MULTIPLIER
              value: {{ .Values.dpLink.reconnectDelayMultiplier | quote }}
            - name: JITTER_FRACTION
              value: {{ .Values.dpLink.jitterFraction | quote }}
            {{- if .Values.dpLink.env }}
            {{- tpl (toYaml .Values.dpLink.env) $ | nindent 12 }}
            {{- end }}
          {{- if .Values.dpLink.livenessProbe }}
          livenessProbe: {{ tpl (toYaml .Values.dpLink.livenessProbe) $ | nindent 12 }}
          {{- end }}
          {{- if .Values.dpLink.readinessProbe }}
          readinessProbe: {{ tpl (toYaml .Values.dpLink.readinessProbe) $ | nindent 12 }}
          {{- end }}
      volumes:
        - name: etc-ssl-certs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        {{- if .Values.dpLink.extraVolumes }}
        {{- tpl (toYaml .Values.dpLink.extraVolumes) $ | nindent 8 }}
        {{- end }}
        {{- include "houston_volumes" . | nindent 8 }}
        {{- include "custom_ca_volumes" . | indent 8 }}

{{- end }}
{{- end }}
