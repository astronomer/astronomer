# Default values for astronomer.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This version number controls the default Airflow chart version that will be installed
# when creating a new deployment in the system. This is also used to ensure all
# child airflow deployments are kept up to date and on the latest version.
airflowChartVersion: 1.17.29

nodeSelector: {}
affinity: {}
tolerations: []

# Images for Astronomer
images:
  commander:
    repository: quay.io/astronomer/ap-commander
    tag: 2.0.8
    pullPolicy: IfNotPresent
  registry:
    repository: quay.io/astronomer/ap-registry
    tag: 3.0.0-8
    pullPolicy: IfNotPresent
    # httpSecret: ~
  houston:
    repository: quay.io/astronomer/ap-houston-api
    tag: 2.0.12
    pullPolicy: IfNotPresent
  astroUI:
    repository: quay.io/astronomer/ap-astro-ui
    tag: 2.0.3
    pullPolicy: IfNotPresent
  dbBootstrapper:
    repository: quay.io/astronomer/ap-db-bootstrapper
    tag: 2.0.0
    pullPolicy: IfNotPresent
  vector:
    repository: quay.io/astronomer/ap-vector
    tag: "0.54.0"
    pullPolicy: IfNotPresent


securityContext:
  runAsNonRoot: true

astroUI:
  replicas: 2
  env: []
  # This only applies when replicas > 3
  maxUnavailable: 25%
  resources: {}
  #  limits:
  #   cpu: 100m
  #   memory: 128Mi
  #  requests:
  #   cpu: 100m
  #   memory: 128Mi
  readinessProbe: {}
  livenessProbe: {}
  serviceAccount:
    # Specifies whether a service account should be created
    create: false
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""
  podAnnotations: {}

houston:
  prismaConnectionLimit: 5
  replicas: 2
  # This only applies when replicas > 3
  maxUnavailable: 25%
  livenessProbe: {}
    # httpGet:
    #   path: /v1/healthz
    #   port: {{ .Values.ports.houstonHTTP }}
    # initialDelaySeconds: 30
    # periodSeconds: 10
    # failureThreshold: 10
  readinessProbe: {}
    # httpGet:
    #   path: /v1/healthz
    #   port: {{ .Values.ports.houstonHTTP }}
    # initialDelaySeconds: 30
    # periodSeconds: 10
    # failureThreshold: 10

  # Houston can regenerate its certificate authority on each 'helm upgrade'
  # or leave it alone. If this is set to 'true', then all users are logged
  # out on each helm upgrade. This is usually preferred 'true' for the case of
  # enterprise, and 'false' for the case of SaaS, where upgrades should be
  # without user interruption.
  regenerateCaEachUpgrade: false
  # Houston datastore
  backendSecretName: ~
  backendConnection:
    {}
    # user: ~
    # pass: ~
    # host: ~
    # port: ~
    # db: ~

  # Airflow backends
  airflowBackendSecretName: ~
  airflowBackendConnection:
    {}
    # user: ~
    # pass: ~
    # host: ~
    # port: ~
    # db: ~

  # This specifies an optional secret name to use to sign JWTs.
  # If not specified, we use an auto-generated, self-signed certificate.
  jwtSigningKeySecretName: ~
  jwtSigningCertificateSecretName: ~

  serviceAccount:
    # Specifies whether a service account should be created
    create: true
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""

  podAnnotations: {}

  # -- Extra environment variables. Uses standard k8s env 'name' and 'value' format.
  env: []

  # For example
  #   `kubectl create secret generic my-secret --from-literal=connection=smtps://USERNAME:PW@HOST/?pool=true`
  # and then set:
  #
  # secret:
  # - envName: "EMAIL__SMTP_URL"
  #   secretName: "my-scret"
  #   secretKey: "connection"
  secret: []

  resources: {}
  #  limits:
  #   cpu: 100m
  #   memory: 128Mi
  #  requests:
  #   cpu: 100m
  #   memory: 128Mi

  # Any Houston configuration. Reference here:
  # https://github.com/astronomer/houston-api/blob/main/config/default.yaml
  config:
    nats:
      ackWait: 600000

  hostAliases: []

  # Worker to connect to NATS
  worker:
    enabled: true
    replicas: 2
    readinessProbe: {}
    livenessProbe: {}
    hostAliases: []

    # Dispatcher configuration for houston-worker
    dispatcher:
      # Enable/disable the dispatcher feature
      enabled: false

      # Dispatcher loop knobs
      lease:
        # TTL for dispatcher leases in seconds
        ttlSeconds: 30

      batch:
        # Maximum batch size for dispatches
        size: 50

      inflight:
        # Maximum inflight operations
        max: 50
        # Maximum inflight operations per data plane
        maxPerDp: 5

      poll:
        # Poll interval in seconds
        seconds: 10

      # Maximum attempts per lease (per process retry loop)
      maxAttemptsPerLease: 5

      # Maximum attempts per flight (durable total retries across processes)
      maxAttemptsPerFlight: 25

      # Cooloff period after max attempts exceeded (in seconds)
      retryCooloffPeriodSeconds: 60

      # RPC timeouts
      rpc:
        # In-region StartFlight RPC timeout in milliseconds
        inRegionTimeoutMs: 5000
        # Cross-region StartFlight RPC timeout in milliseconds
        crossRegionTimeoutMs: 12000

      # Circuit breaker configuration
      circuitBreaker:
        # Failure threshold before circuit opens
        failureThreshold: 10
        # Cooloff period in seconds after circuit opens
        cooloffSeconds: 30
        # Maximum inflight probe requests
        probeMaxInflight: 1

  logging:
    # Vector sidecar for audit log shipping from Houston API and worker.
    # When enabled, a Vector sidecar container is added to both Houston API
    # and Houston Worker pods, along with a log wrapper script that redirects
    # stdout/stderr to files which Vector reads and ships to the configured sink(s).
    # CloudWatch, GCP Cloud Logging, Elasticsearch, and extra sinks can be enabled
    # together when desired.
    loggingSidecar:
      enabled: false

      securityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false

      resources:
        requests:
          memory: "128Mi"
          cpu: "50m"
        limits:
          memory: "256Mi"
          cpu: "200m"

      # AWS CloudWatch Logs configuration
      cloudwatch:
        enabled: false
        region: ""
        logGroupName: "/astronomer/houston/audit"
        # Use IRSA (IAM Roles for Service Accounts) for authentication.
        # When true, no access keys are needed; the service account must be
        # annotated with eks.amazonaws.com/role-arn via houston.serviceAccount.annotations.
        useIRSA: true
        # Secret containing aws_access_key_id and aws_secret_access_key keys.
        # Only used when useIRSA is false.
        secretName: "houston-cloudwatch-creds"

      # GCP Cloud Logging (formerly Stackdriver) configuration
      gcpCloudLogging:
        enabled: false
        # GCP project ID to which logs are published (required).
        projectId: ""
        # Custom log ID that identifies this log stream in Cloud Logging.
        logId: "houston-audit"
        # Monitored resource type. "k8s_container" is the standard for GKE pods.
        resource:
          type: "k8s_container"
          # Required for k8s_container resources. This should be the GKE
          # cluster location, for example "us-east4" or "us-east4-b".
          location: ""
          # Required for k8s_container resources. This should match the GKE
          # cluster name as it appears in Cloud Logging.
          clusterName: ""
        # Map the "level" field in log entries to GCP severity levels.
        severityKey: "level"
        # Use GKE Workload Identity for authentication (recommended).
        # When true, no credentials file is needed; the K8s service account must
        # be annotated with iam.gke.io/gcp-service-account via
        # houston.serviceAccount.annotations.
        useWorkloadIdentity: true
        # Name of the K8s Secret containing a GCP service account JSON key file.
        # Only used when useWorkloadIdentity is false.
        credentialsSecretName: "houston-gcp-logging-creds"
        credentialsSecretKey: "key.json"

      # Elasticsearch configuration
      elasticsearch:
        enabled: false
        # External endpoint URL for the Elasticsearch cluster.
        # This must be set explicitly when Elasticsearch sink support is enabled.
        # e.g. "https://es.example.com:9200"
        endpoint: ~
        # Index name pattern. Supports strftime format for date-based indices.
        index: "houston-audit-%Y.%m.%d"
        apiVersion: "v8"
        auth:
          strategy: "basic"
          secretName: "houston-elasticsearch-creds"
        tls:
          enabled: false
          caSecretName: ""

      # Additional Vector sinks to append under the `sinks:` section.
      # Provide as a YAML snippet with sink keys at the same indentation level
      # as other sinks (e.g., `my_sink:`). Supports templating via `tpl`.
      extraSinks: ""

  # Automatically upgrade Airflow deployments to the latest
  # version specified by Houston configuration.
  # This runs as a Job after helm upgrades.
  upgradeDeployments:
    # Enable this helm hook on upgrade
    enabled: true

    # Only run on deployments marked as canary
    canary: false

  # Cleanup deployments that have been soft-deleted in Houston
  # This runs as a CronJob
  cleanupDeployments:
    # Enable cleanup CronJob
    enabled: true

    # Default here is to run at midnight every night https://crontab.guru/#0_0_*_*_*
    schedule: "0 0 * * *"

    # Cleanup deployments older than this many days
    olderThan: 14

    # Print out the deployments that should be cleaned up and skip actual cleanup
    dryRun: false

    # Only run on deployments marked as canary
    canary: false

    readinessProbe: {}
    livenessProbe: {}

  # Cleanup airflow db data
  # This runs as a CronJob
  cleanupAirflowDb:
    # Enable cleanup CronJob
    enabled: false

    # Default run is at 5:23 every morning https://crontab.guru/#23_5_*_*_*
    schedule: "23 5 * * *"

    # Cleanup deployments older than this many days
    olderThan: 365

    # Output path of archived data csv export
    outputPath: "/tmp"

    # Delete archived tables
    dropArchives: true

    # Print out the deployments that should be cleaned up and skip actual cleanup
    dryRun: false

    # Name of file storage provider, supported providers - aws/azure/gcp/local
    provider: local

    # Name of the provider bucket name / local file path
    bucketName: "/tmp"

    # Airflow provider connection id to connect to provider bucket, read more - https://airflow.apache.org/docs/apache-airflow/stable/howto/connection.html
    providerEnvSecretName: ""

    # Run cleanup on specific table or list of tables in a comma separated format
    tables: ""

    readinessProbe: {}
    livenessProbe: {}

  # Cleanup task usage data and task audit data in Houston
  # This runs as a CronJob
  cleanupTaskUsageData:
    # Run at 23:40 every night
    schedule: "40 23 * * *"  # https://crontab.guru/#40_23_*_*_*

    # Cleanup deployments older than this many days
    olderThan: 90

    # Print out the deployments that should be cleaned up and skip actual cleanup
    dryRun: false

    # Only run on deployments marked as canary
    canary: false

    readinessProbe: {}
    livenessProbe: {}

  # Cleanup task usage data and task audit data in Houston
  # This runs as a CronJob
  cleanupDeployRevisions:
    # Enable cleanup CronJob
    enabled: true

    # Run at 23:11 every night
    schedule: "11 23 * * *"  # https://crontab.guru/#11_23_*_*_*

    # Cleanup deploy revisions older than this many days
    olderThan: 90

    readinessProbe: {}
    livenessProbe: {}

  # Cleanup cluster audits in Houston
  # This runs as a CronJob
  cleanupClusterAudits:
    # Enable cleanup CronJob
    enabled: true

    # Run at 23:49 every night
    schedule: "49 23 * * *"  # https://crontab.guru/#49_23_*_*_*

    # Cleanup deploy revisions older than this many days
    olderThan: 90
    readinessProbe: {}
    livenessProbe: {}

  # Check for Astronomer Platform Updates
  # This runs as a CronJob
  updateCheck:
    # Enable check updates CronJob
    enabled: false

    # url for update service
    url: https://updates.astronomer.io/astronomer-platform

    # Default here is to run at midnight every night https://crontab.guru/#0_0_*_*_*
    schedule: "0 0 * * *"

    readinessProbe: {}
    livenessProbe: {}

  # Check for Astronomer Runtime Updates
  # This runs as a CronJob
  updateRuntimeCheck:
    # Enable check updates CronJob
    enabled: true

    # url for update service
    url: https://updates.astronomer.io/astronomer-runtime

    # Default here is to run at 00:43 every night https://crontab.guru/#43_0_*_*_*
    schedule: "43 0 * * *"

    readinessProbe: {}
    livenessProbe: {}

  # Populate daily task usage data
  # This runs as a CronJob

  populateDailyTaskMetrics:
    # Default here is to run at 00:08 every night
    schedule: "8 0 * * *"

    # Print out the aggregated daily task usage data that should be inserted and skip actual insertion
    dryRun: false

    readinessProbe: {}
    livenessProbe: {}

  populateHourlyTaskAuditMetrics:
    # Run at minute 57 every hour https://crontab.guru/#57_*_*_*_*
    schedule: "57 * * * *"

    readinessProbe: {}
    livenessProbe: {}

  # Sync dataplane clusters in Houston
  # This runs as a CronJob
  syncDataplaneClusters:
    # Enable sync dataplane clusters CronJob
    enabled: true

    # Default here is to run at the top of every hour https://crontab.guru/#0_*_*_*_*
    schedule: "0 * * * *"

    readinessProbe: {}
    livenessProbe: {}

  runtimeReleasesConfigMapName: ~
  runtimeReleasesConfig:
    # example of usage:
    # below are default mandatory fields
    # runtimeVersions:
    #  12.1.1:
    #    metadata:
    #      airflowVersion: 2.10.2
    #      channel: stable

  # Add extra containers here
  extraContainers: []

  # Add volumes to your containers
  extraVolumes: []

  # Add custom annotation for houston ingress
  ingress:
    annotation: {}

  updateResourceStrategy:
    readinessProbe: {}
    livenessProbe: {}

  dbMigration:
    readinessProbe: {}
    livenessProbe: {}

  bootstrapper:
    readinessProbe: {}
    livenessProbe: {}

  waitForDB:
    readinessProbe: {}
    livenessProbe: {}

  taskUsageMetrics:
    readinessProbe: {}
    livenessProbe: {}

# -- DP-Link configuration for data plane linking
dpLink:
  # -- Extra environment variables. Uses standard k8s env 'name' and 'value' format.
  env: []
    # - name: DEBUG
    #   value: "prisma*"

  # -- Extra secret environment variables to insert into the env.
  # For example
  #   `kubectl create secret generic my-secret --from-literal=connection=smtps://USERNAME:PW@HOST/?pool=true`
  # and then set:
  #
  # secret:
  # - envName: "EMAIL__SMTP_URL"
  #   secretName: "my-scret"
  #   secretKey: "connection"
  secret: []

  # -- Enable DP-Link deployment
  # @default -- true
  enabled: true

  # -- Service account configuration
  serviceAccount:
    # -- Specifies whether a service account should be created
    create: true
    # -- Annotations to add to the service account
    annotations: {}
    # -- The name of the service account to use. If not set and create is true, a name is generated using the fullname template
    name: ""

  # -- Number of DP-Link replicas
  # @default -- 3
  replicas: 3

  # -- Claim interval in seconds
  # @default -- 30
  claimIntervalSeconds: 30

  # -- Lease renewal interval in seconds
  # @default -- 15
  leaseRenewalIntervalSeconds: 15

  # -- Lease duration in seconds
  # @default -- 60
  leaseDurationSeconds: 60

  # -- Unreachable threshold in seconds (heartbeat failure threshold, ~9 heartbeat failures)
  # @default -- 90
  unreachableThresholdSeconds: 90

  # -- Degraded threshold in seconds (heartbeat failure threshold, ~3 heartbeat failures)
  # @default -- 30
  degradedThresholdSeconds: 30

  # -- Maximum reconnection attempts
  # @default -- 10
  reconnectMaxAttempts: 10

  # -- Initial reconnection delay in seconds
  # @default -- 1
  initialReconnectDelaySeconds: 1

  # -- Maximum reconnection delay in seconds
  # @default -- 30
  maxReconnectDelaySeconds: 30

  # -- Reconnection delay multiplier for exponential backoff
  # @default -- 2
  reconnectDelayMultiplier: 2

  # -- Jitter fraction for reconnection delay (0.2 = ~20% randomness)
  # @default -- 0.2
  jitterFraction: 0.2

  # -- Pod annotations
  podAnnotations: {}

  # -- Resource requests and limits
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1024Mi"

  # -- Liveness probe configuration
  livenessProbe: {}

  # -- Readiness probe configuration
  readinessProbe: {}

  # -- Arguments to pass to the container
  args: ~

  # -- Additional environment variables
  env: []

  # -- Volume mounts
  volumeMounts: ~

  # -- Extra volumes
  extraVolumes: []

configSyncer:
  enabled: true
  # If not provided, will generate a random hour and minutes to spread cronjob workloads.
  schedule: ~
  securityContext: {}
  resources: {}
  serviceAccount:
    # Specifies whether a service account should be created
    create: true
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""
  readinessProbe: {}
  livenessProbe: {}

flightDeck:
  # -- Enable the flightDeck feature
  # @default -- false
  enabled: false
  migrations:
    securityContext: {}
    resources:
      requests:
        cpu: 100m
        memory: 16Mi
      limits:
        cpu: 200m
        memory: 32Mi
    livenessProbe: {}
    readinessProbe: {}


commander:
  replicas: 2
  env: []
  # This only applies when replicas > 3
  maxUnavailable: 25%
  resources:
    {}
    # limits:
    #  cpu: 100m
    #  memory: 128Mi
    # requests:
    #  cpu: 100m
    #  memory: 128Mi
  livenessProbe: {}
    # failureThreshold: 5
    # httpGet:
    #   path: /healthz
    #   port: {{ .Values.ports.commanderHTTP }}
    #   scheme: HTTP
    # initialDelaySeconds: 10
    # periodSeconds: 10
  readinessProbe: {}
    # httpGet:
    #   path: /healthz
    #   port: {{ .Values.ports.commanderHTTP }}
    # initialDelaySeconds: 10
    # periodSeconds: 10
  podAnnotations: {}

  # Add custom annotation for commander ingress
  ingress:
    annotation: {}
      #nginx.ingress.kubernetes.io/rate-limit: "100"

  airGapped:
    # Enable airgapped mode
    enabled: false
  upgradeTimeout: 600

  serviceAccount:
    # Specifies whether a service account should be created
    create: true
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""

  hostAliases: []

  # Add extra containers to your commander deployment.
  extraContainers: []

  # Add extra volumes to your commander deployment.
  extraVolumes: []

  # Values for Dataplane Metadata
  cloudProvider: ""
  commanderUrl: ""
  region: ""
  jwksHook:
    retryAttempts: 2
    retryDelay: 10
    extraEnv: []

pilot:
  # -- Enable Pilot deployment (data plane only)
  # @default -- false
  enabled: false

  # -- Number of Pilot replicas (data plane only)
  # @default -- 3
  replicas: 3

  # -- Service account configuration
  serviceAccount:
    # -- Specifies whether a service account should be created
    create: true
    # -- Annotations to add to the service account
    annotations: {}
    # -- The name of the service account to use. If not set and create is true, a name is generated using the fullname template
    name: ""

  # -- Pod annotations
  podAnnotations: {}

  # -- Resource requests and limits
  resources: {}
  #  limits:
  #   cpu: 100m
  #   memory: 128Mi
  #  requests:
  #   cpu: 100m
  #   memory: 128Mi

  # -- Liveness probe configuration
  livenessProbe: {}

  # -- Readiness probe configuration
  readinessProbe: {}

  # -- Extra environment variables
  env: []

  # -- Extra volumes
  extraVolumes: []

  # Claim knobs
  # -- Maximum number of in-flight tasks per worker
  # @default -- 5
  maxInflightPerWorker: 5

  # -- Claim poll interval in milliseconds
  # @default -- 5000
  claimPollIntervalMs: 5000

  # -- Maximum batch claim size (defaults to 2 × maxInflightPerWorker)
  # @default -- 10
  maxBatchClaimSize: 10

  # Leasing knobs
  # -- Lease TTL in seconds
  # @default -- 60
  leaseTtlSeconds: 60

  # -- Lease renew tick interval in seconds
  # @default -- 5
  leaseRenewTickSeconds: 5

  # -- Lease renew threshold in seconds
  # @default -- 20
  leaseRenewThresholdSeconds: 20

  # Retry knobs
  # -- Maximum retry attempts per lease
  # @default -- 3
  maxAttemptsPerLease: 3

  # -- Maximum retry attempts per flight
  # @default -- 25
  maxAttemptsPerFlight: 25

  # -- Retry base interval in milliseconds
  # @default -- 250
  retryBaseIntervalMs: 250

  # -- Retry maximum interval in milliseconds
  # @default -- 5000
  retryMaxIntervalMs: 5000

  # -- Retry cool-off period in seconds
  # @default -- 30
  retryCooloffSeconds: 30

  # -- Retry backoff multiplier
  # @default -- 2.0
  retryMultiplier: 2.0

  # -- Retry jitter percentage (0.2 = 20%)
  # @default -- 0.2
  retryJitterPct: 0.2

  # Circuit breaker knobs
  # -- Circuit breaker failure threshold
  # @default -- 10
  cbFailureThreshold: 10

  # -- Circuit breaker cool-off period in seconds
  # @default -- 30
  cbCooloffSeconds: 30

  # -- Circuit breaker probe maximum in-flight
  # @default -- 1
  cbProbeMaxInflight: 1

navigator:
  # -- Enable Navigator deployment (control plane or unified mode only)
  # @default -- false
  enabled: false

  # -- Number of Navigator replicas
  # @default -- 3
  replicas: 3

  # -- Pod annotations
  podAnnotations: {}

  # -- Service account configuration
  serviceAccount:
    # -- Specifies whether a service account should be created
    create: true
    # -- Annotations to add to the service account
    annotations: {}
    # -- The name of the service account to use. If not set and create is true, a name is generated using the fullname template
    name: ""

  # -- Extra environment variables. Uses standard k8s env 'name' and 'value' format.
  env: []

  # For example
  #   `kubectl create secret generic my-secret --from-literal=connection=smtps://USERNAME:PW@HOST/?pool=true`
  # and then set:
  #
  # secret:
  # - envName: "EMAIL__SMTP_URL"
  #   secretName: "my-scret"
  #   secretKey: "connection"
  secret: []

  # -- Resource requests and limits
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1024Mi"

  # -- Custom liveness probe configuration (overrides default)
  livenessProbe: {}

  # -- Custom readiness probe configuration (overrides default)
  readinessProbe: {}

  # -- Extra environment variables
  env: []

  # Component Flag
  # -- Enable Navigator feature flag passed to the application
  # @default -- false
  enabled: false

  # Failover request reconcile loop knobs
  # -- Interval in seconds between failover request reconciler runs
  # @default -- 10
  failoverRequestReconcilerIntervalSeconds: 10

  # Deployment admission control loop knobs
  # -- Interval in seconds for admitting deployments with in-progress missions
  # @default -- 10
  deploymentAdmitForInProgressMissionsIntervalSeconds: 10

  # -- Interval in seconds for admitting deployments with pending cleanup missions
  # @default -- 30
  deploymentAdmitForPendingCleanupMissionsIntervalSeconds: 30

  # -- Batch size for deployment claim operations
  # @default -- 50
  deploymentClaimBatchSize: 50

  # -- Batch size for deployment admit operations
  # @default -- 5
  deploymentAdmitBatchSize: 5

  # Mission reconciler loop knobs
  # -- Minimum batch size for mission claim operations
  # @default -- 10
  missionClaimMinBatchSize: 10

  # -- Batch size for mission plan operations
  # @default -- 5
  missionPlanBatchSize: 5

  # -- Batch size for mission reconcile operations
  # @default -- 5
  missionReconcileBatchSize: 5

  # -- Interval in seconds between claim loop runs
  # @default -- 10
  claimIntervalSeconds: 10

  # -- Fraction of available capacity to claim per interval
  # @default -- 0.5
  claimFraction: 0.5

  # Cleanup knobs
  # -- Interval in seconds between cleanup loop runs
  # @default -- 300
  cleanupIntervalSeconds: 300

  # -- Time-to-live in seconds for completed missions before cleanup (7 days)
  # @default -- 604800
  missionCleanupTtl: 604800

  # -- Time-to-live in seconds for completed flights before cleanup (7 days)
  # @default -- 604800
  flightCleanupTtl: 604800

registry:
  # flag to bypass secure (tls) authentication to astronomer registry
  enableInsecureAuth: False
  replicas: 1
  resources: {}
  #  limits:
  #   cpu: 100m
  #   memory: 128Mi
  #  requests:
  #   cpu: 100m
  #   memory: 128Mi

  livenessProbe: {}
    # httpGet:
    #   path: /
    #   port: {{ .Values.ports.registryHTTP }}
    # initialDelaySeconds: 10
    # periodSeconds: 10
    # timeoutSeconds: 5

  readinessProbe: {}
    # httpGet:
    #   path: /
    #   port: {{ .Values.ports.registryHTTP }}
    # initialDelaySeconds: 10
    # periodSeconds: 10
    # timeoutSeconds: 5

  podSecurityContext:
    fsGroup: 1000
    runAsGroup: 1000
    runAsUser: 1000
  extraEnv: []

  serviceAccount:
    # Specifies whether a service account should be created
    create: false
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""
    # Specifies whether a scc privilege should be created for custom sa
    sccEnabled: false

  persistence:
    # Enable persistent storage
    enabled: true
    # Size of volume to provision
    size: 100Gi
    # If using a custom storageClass, pass name ref to all statefulSets here
    storageClassName: ~
    annotations: {}

  auth:
    secretName: ~
    connection: ~
    service: "docker-registry"
    issuer: "houston"

  gcs:
    enabled: false
    bucket: ~
    useKeyfile: true
    keyfile: /var/gcs-keyfile/astronomer-gcs-keyfile
    rootdirectory: /
    chunksize: "5242880"

  azure:
    enabled: false
    accountname: ~
    accountkey: ~
    container: ~
    realm: ~

  s3:
    enabled: false
    accesskey: ~
    secretkey: ~
    region: ~
    bucket: ~
    encrypt: false
    keyid: ~
    rootdirectory: ~
    regionendpoint: ~

  notifications:
    timeout: 30s

  redirect:
    disable: false

  logLevel: info

  podAnnotations: {}

  hostAliases: []

ports:
  houstonHTTP: 8871
  commanderHTTP: 8880
  commanderGRPC: 50051
  astroUIHTTP: 8080
  registryHTTP: 5000
  registryScrape: 5001
  commanderSidecarHTTP: 8080
  commanderSidecarGRPC: 9090
