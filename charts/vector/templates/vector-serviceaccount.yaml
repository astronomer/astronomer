###########################################################################
# Vector ServiceAccount
###########################################################################
{{- if or (eq .Values.global.plane.mode "data") (eq .Values.global.plane.mode "unified") }}
{{- if and .Values.serviceAccount.create .Values.global.rbac.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "vector.serviceAccountName" . }}
  labels: {{- include "vector.labels" . | nindent 4 }}
  {{- if or .Values.serviceAccount.annotations .Values.global.argoCD.annotation.enabled }}
  annotations:
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if .Values.global.argoCD.annotation.enabled }}
    argocd.argoproj.io/sync-wave: "-1"
    {{- end }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end -}}
{{- end -}}
