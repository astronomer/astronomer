###########################################################################
# Vector ServiceAccount
###########################################################################
{{- if eq (include "logging.enabled" .) "true" }}
{{- if and .Values.serviceAccount.create .Values.global.rbac.enabled }}
apiVersion: v1
kind: ServiceAccount
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
metadata:
  name: {{ include "vector.serviceAccountName" . }}
  labels: 
  {{- include "global.labels" . | nindent 4 }}
  {{- include "vector.labels" . | nindent 4 }}
  {{- if or .Values.serviceAccount.annotations .Values.global.argoCD.annotation.enabled }}
  annotations:
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if .Values.global.argoCD.annotation.enabled }}
    argocd.argoproj.io/sync-wave: "-1"
    {{- end }}
  {{- end }}
{{- end -}}
{{- end -}}
