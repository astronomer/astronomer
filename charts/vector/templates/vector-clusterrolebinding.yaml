###########################################################################
# Vector ClusterRoleBinding
###########################################################################
{{- if eq (include "logging.enabled" .) "true" }}
{{- if .Values.global.rbac.enabled }}
kind: ClusterRoleBinding
apiVersion: {{ template "apiVersion.rbac" . }}
metadata:
  name: {{ template "vector.fullname" . }}
  labels:
    tier: logging
    component: {{ template "vector.name" . }}
    chart: {{ template "vector.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
    {{- include "global.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ template "vector.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "vector.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end -}}
{{- end -}}
