indexPattern: "%Y.%m.%d"

nodeSelector: {}
affinity: {}
tolerations: []

priorityClassName: ~
podSecurityContext: {}


nameOverride: ""
fullnameOverride: ""

vector:
  securityContext:
    runAsUser: 0
  image:
    repository: quay.io/astronomer/ap-vector
    tag: 0.56.0-2
    pullPolicy: IfNotPresent
  resources: ~
  livenessProbe: ~
  readinessProbe: ~
  startupProbe: ~

logLevel: ~

imagePullSecrets: []

podAnnotations: {}
podLabels: {}


serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: ~
  # ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/
  automountServiceAccountToken: true

extraVolumes: []
extraVolumeMounts: []
extraContainers: []
extraInitContainers: []
extraEnv: []

ports:
  promScrape: 24231

elasticsearch:
  port: 9200
  buffer_chunk_limit: 2M
  buffer_queue_limit: 8

extraSinks: []
