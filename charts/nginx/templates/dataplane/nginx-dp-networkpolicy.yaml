###############################################
## Data Plane Nginx controller NetworkPolicy ##
###############################################
{{- if .Values.global.networkPolicy.enabled }}
{{- if eq .Values.global.plane.mode "data" }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-dp-nginx-policy
  labels:
    tier: astronomer
    component: dp-nginx-policy
    release: {{ .Release.Name }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    heritage: {{ .Release.Service }}
    plane: {{ .Values.global.plane.mode }}
spec:
  podSelector:
    matchLabels:
      tier: nginx
      release: {{ .Release.Name }}
    matchExpressions:
      - key: component
        operator: In
        values:
          - dp-ingress-controller
          - ingress-controller
  policyTypes:
  - Ingress
  ingress:
  - from:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - protocol: TCP
      port: {{ .Values.ports.http }}
    - protocol: TCP
      port: {{ .Values.ports.https }}
    - protocol: TCP
      port: {{ .Values.ports.defaultBackendHTTP }}
{{- end }}
{{- end }}
