##########################
## NGINX ServiceAccount ##
##########################
{{- if and .Values.defaultBackend.enabled .Values.defaultBackend.serviceAccount.create .Values.global.rbac.enabled }}
kind: ServiceAccount
apiVersion: v1
automountServiceAccountToken: {{ .Values.defaultBackend.serviceAccount.automountServiceAccountToken }}
metadata:
  name: {{ template "defaultBackend.serviceAccountName" . }}
  labels:
    {{- include "global.labels" . | nindent 4 }}
    tier: nginx
    chart: {{ template "nginx.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
  annotations:
  {{- with .Values.defaultBackend.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
