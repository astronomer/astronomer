# Default values for Prometheus.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

nodeSelector: {}
affinity: {}
tolerations: []
podLabels: {}

# Prometheus is not designed to be horizontally scalable behind a single load
# balancer. This configuration will increase the replicas in the Prometheus
# StatefulSet, and assign a different Service to each Pod. In this way,
# applications with high availability requirements may handle retrying for
# missing data on the other Service(s). The StatefulSet will manage the Pods
# such that only one is replaced at a time.
replicas: 1

# Session affinity for the aggregate Prometheus Service. Left unset by default
# so the rendered Service carries no spec.sessionAffinity / sessionAffinityConfig
# fields, which some clusters forbid (e.g. Gatekeeper's deny-ingress-sticky-sessions).
# Set to "ClientIP" to pin clients to a single Prometheus pod, which is only
# meaningful when replicas > 1 (active/passive query consistency).
#
# UPGRADE NOTE: Versions prior to 2.1.0 hardcoded sessionAffinity: ClientIP on
# this Service. As of 2.1.0 it is unset by default to satisfy clusters that
# forbid sticky sessions. This is a no-op at the default replicas: 1, but HA
# deployments running replicas > 1 should set sessionAffinity: "ClientIP" here.
# Otherwise the aggregate Service round-robins across pods, and since Prometheus
# replicas are active/passive (each scrapes independently and may hold different
# data/gaps), the default consumers that query this Service -- Grafana datasource
# and Houston -- can see inconsistent results across requests.
sessionAffinity: ""

images:
  prometheus:
    repository: quay.io/astronomer/ap-prometheus
    tag: 3.13.1
    pullPolicy: IfNotPresent
  configReloader:
    repository: quay.io/astronomer/ap-configmap-reloader
    tag: 0.15.0-7
    pullPolicy: IfNotPresent
  filesdReloader:
    repository: quay.io/astronomer/ap-kuiper-reloader
    tag: 0.2.7
    pullPolicy: IfNotPresent
  promproxy:
    repository: quay.io/astronomer/ap-openresty
    tag: 1.31.1
    pullPolicy: IfNotPresent


resources:
  limits:
    cpu: 500m
    memory: 2Gi
  requests:
    cpu: 250m
    memory: 1Gi

podAnnotations: {}

serviceAccount:
  # ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/
  automountServiceAccountToken: true
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ~

livenessProbe: {}
  # httpGet:
  #   path: /-/healthy
  #   port: {{ .Values.ports.http }}
  # initialDelaySeconds: 10
  # periodSeconds: 5
  # failureThreshold: 3
  # timeoutSeconds: 1
readinessProbe: {}
  # httpGet:
  #   path: /-/ready
  #   port: {{ .Values.ports.http }}
  # initialDelaySeconds: 10
  # periodSeconds: 5
  # failureThreshold: 3
  # timeoutSeconds: 1
startupProbe: {}
  # httpGet:
  #   path: /-/healthy
  #   port: {{ .Values.ports.http }}
  # failureThreshold: 30
  # periodSeconds: 10

podSecurityContext:
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true
  runAsUser: 65534
configMapReloader:
  livenessProbe: {}
  readinessProbe: {}
  startupProbe: {}
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 50m
      memory: 32Mi

filesdReloader:
  livenessProbe: {}
  readinessProbe: {}
  startupProbe: {}
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 50m
      memory: 32Mi
  extraEnv: []
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
    runAsUser: 65534

# Which directory prometheus data should be stored
dataDir: "/prometheus"

# How long prometheus should keep data before removing
retention: 15d

# Enable persistence for Prometheus
persistence:
  enabled: true
  size: 100Gi
  storageClassName: ~
  annotations: {}
  persistentVolumeClaimRetentionPolicy: ~

ports:
  http: 9090

ingressNetworkPolicyExtraSelectors: []

astroHTTPTargets:
  commander: true
  houston: true
  registry: true
  grafana: true
  elasticsearch: true

# Enable prometheus lifecycle api
enableLifecycle: true

# This section allows you to disable parts of the default set of alerts. Use
# this in combination with additionalAlerts if you want prometheus to only
# use the alerts you have configured.
defaultAlerts:
  airflow:
    enabled: true
  platform:
    enabled: true

additionalAlerts:
  # Additional rules appended to the default 'platform' alert group
  # Provide as a block string in yaml list form
  platform: ~
  # Additional rules appended to the default 'airflow' alert group
  # Provide as a block string in yaml list form
  airflow: ~
# Example:
# airflow: |
#   - alert: MyExampleAlert
#     # If greater than 10% task failure
#     expr: 100 * sum(increase(airflow_ti_failures[30m])) /  (sum(increase(airflow_ti_failures[30m])) + sum(increase(airflow_ti_successes[30m]))) > 10
#     for: 15m
#     labels:
#       tier: airflow
#     annotations:
#       summary: "The Astronomer Helm release {{ .Release.Name }} is failing task instances {{ printf \"%.2f\" $value }}% of the time over the past 30 minutes"
#       description: Task instances failing above threshold
additionalScrapeJobs: {}
# Example:
# additionalScrapeJobs:
#   - job_name: 'my-job'
#     kubernetes_sd_configs:
#       - role: endpoints
#     relabel_configs:
#       - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
#         action: keep
#         regex: true
#       - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scheme]
#         action: replace
#         target_label: __scheme__
#         regex: (https?)
#       - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
#         action: replace
#

# Prometheus config file remote_write stanza
# https://prometheus.io/docs/prometheus/latest/configuration/configuration/
# remote_write: {}

# Prometheus config file global.external_labels stanza
# https://prometheus.io/docs/prometheus/latest/configuration/configuration/#remote_write
# external_labels: {}

federation:
  externalLabels: {}
  auth:
    enabled: true
    replicas: 2
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
  ingress:
    annotations: {}
  livenessProbe: {}
  readinessProbe: {}
  startupProbe: {}

extraFlags:
- "--enable-feature=auto-config-reload"
#- "--log.level=debug"


# Amost mirror the prometheus config data structure for values we want to customize.
# Convert lists to dicts for more explicit assignment.
# Convert dashes to underscores for golang compatibility.
config:
  # Enables kubelet and cAdvisor scrape jobs for pod-level metrics
  enableSelfScrape: false
  scrape_configs:
    kubernetes_apiservers:
      tls_config:
        insecure_skip_verify: false
    federated_dataplanes:
      scrape_interval: 15s
      scrape_timeout: 10s

rbac:
  role:
    kind: ClusterRole
    create: true

priorityClassName: ~
