# PINF-1031: catches the class of regression in PINF-1033 (a PSS-Restricted
# hardening change broke global.authSidecar, not caught until QA). Neither
# toggle alone would catch it -- the failure was in the interaction between
# them, so this scenario combines both rather than testing them separately.
#
# enable-psa.yaml (global.namespaceLabels) covers the OTHER namespace tier
# namespace_labels below can't reach: it labels Airflow Deployment namespaces
# that Commander creates, not the static platform namespace. Both are needed
# to catch PSS-Restricted breaking authSidecar regardless of which tier it
# breaks in -- test_auth_sidecar.py creates a real Airflow Deployment to
# exercise this half.
topology: unified
# Two concurrent-ish Airflow Deployment lifecycles (dag_deploy then switched to
# git_sync) plus the platform chart pushed the default xlarge CI machine's CPU past
# FailedScheduling territory even after scenario-airflow-reduce-resources.yaml -- see
# PINF-1080.
resource_class: 2xlarge
values:
  - configs/enable-auth-sidecar.yaml
  - configs/psa-restricted.yaml
  - configs/enable-psa.yaml
  - configs/scenario-airflow-reduce-resources.yaml
namespace_labels:
  pod-security.kubernetes.io/enforce: restricted
  pod-security.kubernetes.io/enforce-version: latest
  pod-security.kubernetes.io/audit: restricted
  pod-security.kubernetes.io/warn: restricted
