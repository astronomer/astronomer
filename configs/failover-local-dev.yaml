astronomer:
  dpLink:
    enabled: true
    env:
      - name: DPLINK_DEBUG_ENABLED
        value: "true"
      - name: DEBUG
        value: "true"
  flightDeck:
    enabled: true
  houston:
    worker:
      dispatcher:
        enabled: true
  images:
    commander:
      pullPolicy: Always
      tag: feature_apc-dr
    houston:
      pullPolicy: Always
      tag: feature_apc-dr
  navigator:
    enabled: true
  pilot:
    enabled: true
global:
  prometheusPostgresExporterEnabled: false
  ssl:
    enabled: true
    mode: disable
tags:
  logging: false
  monitoring: false
