# Dev config for testing a variety of git-sync related features
---
astronomer:
  # images:
  #   houston:
  #     tag: some-custom-tag
  #     pullPolicy: Always
  #     repository: quay.io/astronomer/ap-houston-api
  # airflowChartVersion: 1.18.2-build43533
  houston:
    config:
      deployments:
        # CA Secret names git-sync deployments must trust (emitted as global.privateCaCerts)
        # privateCaCertSecretNames:
        #   - git-forgejo-ca
        deployMechanisms:
          # Enable dag deployment features
          configureDagDeployment:
            enabled: true

          # Enable the git-sync dag deployment feature
          gitSyncDagDeployment:
            enabled: true
        helm:
          gitSyncRelay:
            metrics:
              enabled: true

global:
  helmRepo: https://internal-helm.astronomer.io
  # IMPORTANT: Helm REPLACES list values across -f files, it does not merge them.
  # bin/setup-cp-dp-k3d.py generates each plane's values with
  # privateCaCerts: [mkcert-root-ca] — the mkcert root CA that signs
  # houston.localtest.me (created on both CP and DP). This file is passed via
  # --helm-values, which is applied LAST and wins, so it replaces that list. We
  # must re-list mkcert-root-ca here or the DP commander stops trusting houston
  # and its JWKS hook fails with CERTIFICATE_VERIFY_FAILED / self-signed
  # certificate in chain.
  # privateCaCerts:
  #   - mkcert-root-ca
  #   - git-forgejo-ca
  # gitSyncRelay:
  #   images:
  #     gitSync:
  #       tag: some-custom-tag
  #       pullPolicy: Always
  #       repository: quay.io/astronomer/ap-git-sync-relay
  #     gitDaemon:
  #       tag: some-custom-tag
  #       pullPolicy: Always
  #       repository: quay.io/astronomer/ap-git-daemon
  # airflow:
  #   images:
  #     gitSync:
  #       # OSS airflow component's git-sync sidecar
  #       repository: quay.io/astronomer/ap-git-sync
  #       tag: some-custom-tag
  #       pullPolicy: Always
