---
global:
  namespaceLabels:
    # https://kubernetes.io/docs/concepts/security/pod-security-admission/#pod-security-admission-labels-for-namespaces
    # Available values: privileged, baseline, restricted
    #
    # These labels reach app-deployed Airflow namespaces (and namespace-pool
    # namespaces): global.namespaceLabels flows through the commander-metadata
    # ConfigMap and Commander stamps them onto every namespace it creates. They
    # do NOT reach the APC platform install namespace, which helm makes via
    # --create-namespace without labels; label that namespace directly to bring
    # platform pods under PSA:
    #   kubectl label namespace <astronomer-namespace> \
    #     pod-security.kubernetes.io/enforce=restricted \
    #     pod-security.kubernetes.io/enforce-version=latest
    # Note: enforce=restricted on the platform namespace rejects the privileged-
    # by-design components (containerd-ca-update/private-ca, vector, elasticsearch
    # sysctl init); disable those or keep the platform ns on audit/warn only.
    pod-security.kubernetes.io/enforce: "restricted"
    pod-security.kubernetes.io/enforce-version: "latest"
    pod-security.kubernetes.io/audit: "restricted"  # check the audit logs. This is nontrivial in k3d.
    pod-security.kubernetes.io/warn: "restricted"  # check commander logs for `"msg"="Warning`
