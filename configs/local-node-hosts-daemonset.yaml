# Self-healing node /etc/hosts pin for the local CP/DP k3d setup, used by bin/setup-cp-dp-k3d.py.
# A node's /etc/hosts is regenerated by Docker on container restart, so this DaemonSet re-appends the
# pin on every node/pod start (a busybox loop). That keeps node-level cross-cluster resolution
# (e.g. containerd image-pull registry auth to houston.<baseDomain>) working across OrbStack/Mac
# restarts, targeting the fixed astronomer-net gateway (-> the astro-cp-dp-proxy).
# Loaded and filled in via str.format() — see _node_hosts_daemonset_manifest() there. Placeholders:
#   {ds_name}     DaemonSet + app-label name (astronomer-cp-hosts-pin on DP / astronomer-dp-hosts-pin on CP)
#   {hosts_line}  the /etc/hosts line to enforce: "<gateway-ip> host1 host2 ..."
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {ds_name}
  namespace: kube-system
  labels:
    app: {ds_name}
spec:
  selector:
    matchLabels:
      app: {ds_name}
  template:
    metadata:
      labels:
        app: {ds_name}
    spec:
      tolerations:
        - operator: Exists
      containers:
        - name: hosts-pin
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              LINE="{hosts_line}"
              while true; do
                grep -qF "$LINE" /host/etc/hosts 2>/dev/null || echo "$LINE" >> /host/etc/hosts
                sleep 30
              done
          volumeMounts:
            - name: etchosts
              mountPath: /host/etc/hosts
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              memory: 32Mi
      volumes:
        - name: etchosts
          hostPath:
            path: /etc/hosts
            type: File
      terminationGracePeriodSeconds: 1
