############################
## Astronomer configuration
## Version-specific overrides for the 2.x chart schema (release-2.0 / release-2.1)
## used by bin/setup-cp-dp-k3d.py for --version 2.0.0 / 2.0.1 / 2.1. global.postgresql.enabled
## and tags.postgresql are set per CP/DP by the script itself, not here, since CP needs postgres
## on and DP needs it off.
## NOTE: hardDeleteDeployment is intentionally absent here — PLX-575 made hard delete the
## default and only behavior on 2.x, so there's no flag for it anymore.
############################

global:
  helmRepo: "https://internal-helm.astronomer.io"
  deploymentLifecycle:
    deployRollback:
      enabled: true
  metricsReporting:
    taskUsageMetrics:
      enabled: true
  daemonsetLogging:
    enabled: true
  deployMechanisms:
    dagOnlyDeployment:
      enabled: true
  nats:
    enabled: true
    replicas: 1
  networkPolicy:
    enabled: false
  defaultDenyNetworkPolicy: false

astronomer:
  astroUI:
    replicas: 1
  houston:
    replicas: 1
    worker:
      replicas: 1
    config:
      emailConfirmation:
        enabled: false
      publicSignups:
        enabled: false
      auth:
        local:
          enabled: true
      deployments:
        logHelmValues:
          enabled: true
        deployMechanisms:
          dagOnlyDeployment:
            enabled: true
          gitSyncDagDeployment:
            enabled: true
          configureDagDeployment:
            enabled: true
        runtimeManagement:
          airflowV3:
            enabled: true
            minimumAstroRuntimeVersion: "3.1-2"
          listAllRuntimeVersions:
            enabled: true
  commander:
    replicas: 1
  registry: {}

nginx:
  replicas: 1
  replicasDefaultBackend: 1

nats:
  cluster:
    enabled: false
    replicas: 1
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"

elasticsearch:
  common:
    env:
      NUMBER_OF_MASTERS: "1"
  master:
    replicas: 1
    heapMemory: 128m
    resources:
      requests:
        cpu: "100m"
        memory: 256Mi
  data:
    replicas: 1
    heapMemory: 256m
    resources:
      requests:
        cpu: "100m"
        memory: 512Mi
  client:
    replicas: 1
    heapMemory: 128m
    resources:
      requests:
        cpu: "100m"
        memory: 256Mi
  images:
    es:
      repository: docker.elastic.co/elasticsearch/elasticsearch
      tag: "8.18.6"
