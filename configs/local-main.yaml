############################
## Astronomer configuration
## Used by bin/setup-cp-dp-k3d.py for --version main (installs from the local checkout).
## Deliberately separate from configs/local-dev.yaml, which is also used by the unrelated
## KinD-based bin/reset-local-dev workflow (see docs/local-development.md) — changes here
## can't accidentally affect that path.
############################

tags:
  platform: true

global:
  helmRepo: "https://internal-helm.astronomer.io"
  # Base domain for all subdomains exposed through ingress
  baseDomain: localtest.me
  # Mode of the plane, can be 'data', 'unified' or 'local'
  plane:
    domainPrefix: "local"

  # Name of secret containing TLS certificate
  tlsSecret: astronomer-tls
  postgresql:
    enabled: true
  nats:
    replicas: 1
    enabled: true
  stan:
    replicas: 1
    enabled: true
  ssl:
    enabled: false
  # Custom CA TLS certificates
  # Each secret must have one data entry 'cert.pem'
  privateCaCerts:
  - private-ca
  deployMechanisms:
    dagOnlyDeployment:
      enabled: true

nats:
  cluster:
    enabled: false
    replicas: 1
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"

stan:
  stan:
    replicas: 1
  store:
    cluster:
      enabled: false
  resources: {}

############################
## Astronomer configuration
############################
astronomer:
  astroUI:
    replicas: 1
  houston:
    replicas: 1
    worker:
      replicas: 1

    config:
      emailConfirmation:
        enabled: false
      auth:
        local:
          enabled: true
      deployments:
        logHelmValues:
          enabled: true
        deployMechanisms:
          dagOnlyDeployment:
            enabled: true
          gitSyncDagDeployment:
            enabled: true
          configureDagDeployment:
            enabled: true
        runtimeManagement:
          airflowV3:
            enabled: true
            minimumAstroRuntimeVersion: "3.1-2"
          listAllRuntimeVersions:
            enabled: true
  commander:
    replicas: 1
  registry: {}

#################################
## Nginx configuration
#################################
nginx:
  replicas: 1
  replicasDefaultBackend: 1
  # Configure resources
  resources:
    requests:
      cpu: "500m"
      memory: "1024Mi"
    limits:
      cpu: "1"
      memory: "2048Mi"

#################################
## Elasticsearch configuration
#################################
elasticsearch:
  common:
    env:
      NUMBER_OF_MASTERS: "1"
  master:
    replicas: 1
    heapMemory: 128m
    resources:
      requests:
        cpu: "100m"
        memory: 256Mi
  data:
    replicas: 1
    heapMemory: 256m
    resources:
      requests:
        cpu: "100m"
        memory: 512Mi
  client:
    replicas: 1
    heapMemory: 128m
    resources:
      requests:
        cpu: "100m"
        memory: 256Mi
  images:
    es:
      repository: docker.elastic.co/elasticsearch/elasticsearch
      tag: "8.18.6"
