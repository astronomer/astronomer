##################################
## Astronomer global configuration
##################################
global:
  # Base domain for all subdomains exposed through ingress
  baseDomain: ~
    # Name of Kubernetes secret containing registry auth token used for cross-plane authentication (registry, federation, etc.)
  authHeaderSecretName: ~
  # This is to select the mode in which the Astronomer platform will run.
  # The mode can be one of: control, data, unified
  # - control: The Astronomer platform will run in control plane mode, where it is responsible for platform management, orchestration, and user interfaces
  # - data: The Astronomer platform will run in data plane mode, where it is responsible for executing and monitoring Airflow workloads.
  # - unified: The Astronomer platform will run with both the data plane and control plane in the same cluster and namespace. This is the behavior found in Astronomer 0.x.
  plane:
    mode: "unified"  # one of: control, data, unified
    domainPrefix: ""    # cluster-id

  # Shared secret for internal service-to-service authentication (e.g. pilot -> commander gRPC).
  # Auto-generated on install if empty; preserved across upgrades.
  internalServiceAuth:
    token: ""

  # Labels to add to every pod
  podLabels: {}

  # Name of secret containing TLS certificate
  tlsSecret: astronomer-tls

  # List of secrets containing private CA certificates
  privateCaCerts: []
  # Most users with private CA will already have their node
  # images created including the cert to trust in the appropriate
  # location. If not, it is necessary to configure Docker (or containerd)
  # on all nodes to trust the private root CA. This will allow
  # kubelet to pull from the Astronomer registry that has been signed
  # by the same private CA.
  privateCaCertsAddToHost:
    enabled: false
    hostDirectory: /etc/docker/certs.d
    addToContainerd: false
    addToDockerd: true
    containerdCertConfigPath: /etc/containerd/certs.d
    containerdHostPath: /etc/containerd
    containerdConfigToml: ~
    containerdnodeAffinitys: []
    containerdTolerations: []
    certCopier:
      repository: quay.io/astronomer/ap-base
      tag: 2026.03.18
      pullPolicy: IfNotPresent
    priorityClassName: ~
  #Global flag to enable Operator based deployment
  airflowOperator:
    enabled: false

  # Feature flags
  rbac:
    enabled: true

  scc:
    enabled: false

  openshift:
    enabled: false

  networkPolicy:
    enabled: true

  networkNSLabels:
    enabled: false

  # Namespace management features
  namespaceManagement:
    # Configure vector to gather logs from all available namespaces
    manualNamespaceNames:
      enabled: false
    namespaceFreeFormEntry:
      enabled: false
    namespacePools:
      enabled: false
      # if createRbac is set to false then platform does not create roles and rolebinding.
      createRbac: true
      namespaces:
        # if create is enabled, this helm chart will create the provided k8s namespaces
        create: false
        names: []

  # dataPlaneFailover: master switch for DR failover
  # On data plane (mode=data): enables pilot, flightDeck, and commander StartFlight RPC
  # On control plane (mode=control): enables navigator, dp-link, and houston dispatcher
  # On unified (mode=unified): no effect — enable components individually
  dataPlaneFailover:
    enabled: false

  # Metrics and reporting features
  metricsReporting:
    taskUsageMetrics:
      enabled: false

  # Deployment lifecycle features
  deploymentLifecycle:
    deployRollback:
      enabled: false

  # Deploy mechanisms
  deployMechanisms:
    dagOnlyDeployment:
      enabled: false
      repository: quay.io/astronomer/ap-dag-deploy
      tag: 0.9.3
      securityContexts:
        pod:
          fsGroup: 50000
      server:
        readinessProbe: {}
        livenessProbe: {}
        nodeSelector: {}
        affinity: {}
        tolerations: []
      client:
        readinessProbe: {}
        livenessProbe: {}
      resources: {}
      persistence: {}

  # Deploy auth sidecar to use openshift native features
  authSidecar:
    enabled: false
    repository: quay.io/astronomer/ap-auth-sidecar
    tag: 1.29.5
    pullPolicy: IfNotPresent
    port: 8084
    securityContext: {}
    readinessProbe: {}
    livenessProbe: {}
    ingressAllowedNamespaces: []
    default_nginx_settings: |
      internal;
      proxy_pass_request_body     off;
      proxy_set_header            Content-Length          "";
      proxy_set_header            X-Forwarded-Proto       "";
      proxy_set_header            X-Original-URL          https://$http_host$request_uri;
      proxy_set_header            X-Original-Method       $request_method;
      proxy_set_header            X-Real-IP               $remote_addr;
      proxy_set_header            X-Forwarded-For         $remote_addr;
      proxy_set_header            X-Auth-Request-Redirect $request_uri;
      proxy_buffering             off;
      proxy_buffer_size           4k;
      proxy_buffers               4 4k;
      proxy_request_buffering     on;
      proxy_http_version          1.1;
      proxy_ssl_server_name       on;
      proxy_pass_request_headers  on;
      client_max_body_size        1024m;
    default_nginx_settings_location: |
      auth_request     /auth;
      auth_request_set $auth_status $upstream_status;
      auth_request_set $auth_cookie $upstream_http_set_cookie;
      add_header       Set-Cookie $auth_cookie;
      auth_request_set $authHeader0 $upstream_http_authorization;
      proxy_set_header 'authorization' $authHeader0;
      auth_request_set $authHeader1 $upstream_http_username;
      proxy_set_header 'username' $authHeader1;
      auth_request_set $authHeader2 $upstream_http_email;
      proxy_set_header 'email' $authHeader2;
      error_page 401 = @401_auth_error;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'connection_upgrade';
      proxy_set_header X-Real-IP              $remote_addr;
      proxy_set_header X-Forwarded-For        $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_cache_bypass $http_upgrade;
      proxy_set_header X-Original-Forwarded-For $http_x_forwarded_for;
      proxy_connect_timeout                   15s;
      proxy_send_timeout                      600s;
      proxy_read_timeout                      600s;
      proxy_buffering                         off;
      proxy_buffer_size                       4k;
      proxy_buffers                           4 4k;
      proxy_max_temp_file_size                1024m;
      proxy_request_buffering                 on;
      proxy_http_version                      1.1;
      proxy_cookie_domain                     off;
      proxy_cookie_path                       off;
      proxy_redirect                          off;
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1024Mi"

  # namespaceLabels is a map of Kubernetes labels that will be applied to airflow deployment namespaces
  namespaceLabels: {}
    # To enforce PSA baseline policy, use the following values:
    # pod-security.kubernetes.io/enforce: baseline
  # Use kube-lego
  acme: false

  # whether to create pod disruption budgets by default for platform components
  podDisruptionBudgets:
    enabled: true

  # URL to the Astronomer helm repo
  helmRepo: "https://helm.astronomer.io"

  # Use cluster roles
  clusterRoles: true

  # Enables necessary components for compatibility with Istio Service Mesh
  istio:
    enabled: false
    rootNamespace: "istio-config"

  # Enable default postgresql database.
  # This is not recommended for production.
  postgresql:
    enabled: false

  prometheusPostgresExporter:
    enabled: false
  nodeExporter:
    enabled: false

  # Used to enable nats-server
  nats:
    enabled: true
    replicas: 3
    jetStream:
      enabled: true
      tls: false

  # Do you want to apply the global, default deny ingress network policy?
  defaultDenyNetworkPolicy: true


  manageClusterScopedResources:
    enabled: true

  perHostIngress:
    enabled: false

  logging:
    indexNamePrefix: ~
    provider: ~
    loggingSidecar:
      enabled: false
      name: sidecar-log-consumer
      repository: quay.io/astronomer/ap-vector
      tag: 0.53.0
      customConfig: false
      indexPattern: ~
      extraEnv: []
      securityContext: {}
      readinessProbe: {}
      livenessProbe: {}
      resources: {}
      #  requests:
      #    cpu: "100m"
      #    memory: "386Mi"
      #  limits:
      #    cpu: "100m"
      #    memory: "386Mi"

  # External ES logging
  customLogging:
    enabled: false
    scheme: https
    host: ""
    port: ""
    secret: ""
    #secretName: ~
    #awsSecretName: ~
    #awsIAMRole: ~
    #awsServiceAccountAnnotation: ~
    extraEnv: []

  ## Add annotations to all the auth sidecar deployed ingress resources
  ##
  extraAnnotations: {}
    #kubernetes.io/ingress.class: "default"
    #route.openshift.io/termination: "passthrough"

  podAnnotations: {}

  # Enable values required for use with Microsoft Azure
  azure:
    enabled: false

  # Set nodeSelector, affinity, and tolerations values for platform and deployment related pods.
  # This allows for separation of platform and airflow pods between kubernetes node pools.
  # Pods in the platformNodePool include alertmanager, commander, houston, kube-replicator, astro-ui,registry,
  # es-client, es-data, es-exporter, es-master, nginx-es, grafana, kube-state, nginx, nginx-default, prometheus.
  # nodeSelector, affinity, and tolerations values for airflow deployment pods are assigned via houston config.
  # See more information on pod / node assignment here: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/
  platformNodePool:
    nodeSelector: &platformNodeSelector
      {}
    affinity: &platformAffinity
      {}
    tolerations: &platformTolerations
      []

  privateRegistry:
    enabled: false
    repository: ~
    secretName: ~

  # SSL support for using SSL connections to encrypt client/server communication between database and Astronomer platform
  ssl:
    enabled: false
    mode: "prefer"
    # we need separate mode for grafana:
    # grafana starting from (7.5.0) only supports sslmodes: disable/require/verify-ca/verify-full
    # https://github.com/grafana/grafana/blob/master/CHANGELOG.md#750-beta1-2021-03-04 (Postgres: SSL certification)
    grafana:
      sslmode: "require"

  # Storage class for persistent volumes. If you have multiple storage classes available this will force all charts with persistent
  # volumes to use the one specified here.
  # storageClass: ~

  # Enable argo CD annotations currently available only for:
  # ServiceAccounts, ClusterRoles, RoleBindings, ClusterRoleBindings
  # https://github.com/argoproj/argo-cd/blob/master/docs/user-guide/sync-waves.md
  argoCD:
    annotation:
      enabled: false

  airflow:
    images:
      statsd:
        repository: quay.io/astronomer/ap-statsd-exporter
        tag: 0.29.0
      redis:
        repository: quay.io/astronomer/ap-redis
        tag: 8.6.1
      pgbouncer:
        repository: quay.io/astronomer/ap-pgbouncer
        tag: 1.24.1-6
      pgbouncerExporter:
        repository: quay.io/astronomer/ap-pgbouncer-exporter
        tag: 0.20.0-3
      gitSync:
        repository: quay.io/astronomer/ap-git-sync
        tag: 2026.3.18
      xcom:
        repository: quay.io/astronomer/ap-init
        tag: 2026.3.18
  gitSyncRelay:
    images:
      gitDaemon:
        repository: quay.io/astronomer/ap-git-daemon
        tag: 2026.3.18
      gitSync:
        repository: quay.io/astronomer/ap-git-sync-relay
        tag: 0.2.5
    metrics:
      enabled: false

  # For now we support only pgbouncer with gss api support
  pgbouncer:
    enabled: false
    gssSupport: true
    secretName: astronomer-pgbouncer-config
    # we use it only for in cluster postgresql
    # so we can override astronomer-bootstrap secret
    username: postgres
    password: postgres
    servicePort: "6543"
    extraEnv: []
      # some: thing
      # another: thing
    extraLabels: []
      # do-funky-injection: maybe

#################################
## Default tagged groups enabled
#################################
tags:
  # Enable platform components by default (nginx, astronomer)
  platform: true

  # Enable monitoring stack (prometheus, kube-state, grafana)
  monitoring: true

  # Enable logging stack (elasticsearch, vector)
  logging: true

#################################
## Astronomer configuration
#################################
astronomer:
  astroUI:
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "1024Mi"

  houston:
    # Vector sidecar for audit log shipping from Houston API and worker.
    # This mirrors charts/astronomer/values.yaml for customers who install
    # or upgrade the umbrella chart from the repo root or packaged release.
    # When enabled, Vector can ship to one or more sinks at the same time.
    logging:
      loggingSidecar:
        enabled: false

        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false

        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"

        cloudwatch:
          enabled: false
          region: ""
          logGroupName: "/astronomer/houston/audit"
          useIRSA: true
          secretName: "houston-cloudwatch-creds"

        gcpCloudLogging:
          enabled: false
          projectId: ""
          logId: "houston-audit"
          resource:
            type: "k8s_container"
          severityKey: "level"
          useWorkloadIdentity: true
          credentialsSecretName: "houston-gcp-logging-creds"
          credentialsSecretKey: "key.json"

        elasticsearch:
          enabled: false
          # External endpoint URL for the Elasticsearch cluster.
          # This must be set explicitly when Elasticsearch sink support is enabled.
          endpoint: ~
          index: "houston-audit-%Y.%m.%d"
          apiVersion: "v8"
          auth:
            strategy: "basic"
            secretName: "houston-elasticsearch-creds"
          tls:
            enabled: false
            caSecretName: ""

        extraSinks: ""

    resources:
      requests:
        cpu: "500m"
        memory: "1024Mi"
      limits:
        cpu: "1000m"
        memory: "2048Mi"

  commander:
    resources:
      requests:
        cpu: "250m"
        memory: "1Gi"
      limits:
        cpu: "500m"
        memory: "2Gi"

  registry:
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1024Mi"

    persistence:
      enabled: true
      size: "100Gi"

  install:
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "1024Mi"

  extraObjects: []

  # podLabels: {}

#################################
## Nginx configuration
#################################
nginx:
  resources:
    requests:
      cpu: "500m"
      memory: "1024Mi"
    limits:
      cpu: "1"
      memory: "2048Mi"

  # String IP address the nginx ingress should bind to
  loadBalancerIP: ~

  # List used to restrict IPs that can reach the nginx ingress
  loadBalancerSourceRanges: []

  # Dict of arbitrary annotations to add to the nginx ingress
  ingressAnnotations: {}

  defaultBackend:
    resources:
      requests:
        cpu: "100m"
        memory: "50Mi"
      limits:
        cpu: "120m"
        memory: "100Mi"

#################################
## Grafana configuration
#################################
grafana:
  # Configure resources
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1024Mi"

  dashboards:
    {}
    # default:
    #   velero:
    #     file: dashboards/velero.json

  # provide extra configurations to grafana via environment variables
  extraEnvVars:
    []
    # - name: GF_SMTP_ENABLED
    #   value: "true"
    # - name: GF_SMTP_HOST
    #   value: smtp.astronomer.io
    # - name: GF_SMTP_USER
    #   value: grafana
    # - name: GF_SMTP_PASSWORD
    #   valueFrom:
    #     secretKeyRef:
    #       name: grafana-smtp-secret
    #       key: smtp_password


#################################
## Prometheus configuration
#################################
prometheus:
  podLabels: {}
  # Data retention
  retention: 15d

  persistence:
    enabled: true
    size: "150Gi"

  resources:
    requests:
      cpu: "1000m"
      memory: "4Gi"
    limits:
      cpu: "2000m"
      memory: "8Gi"

  configMapReloader:
    resources:
      limits:
        cpu: 100m
        memory: 25Mi
      requests:
        cpu: 100m
        memory: 25Mi

  filesdReloader:
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 500m
        memory: 512Mi


nats:
  nodeSelector:
    <<: *platformNodeSelector
  affinity:
    <<: *platformAffinity
  tolerations: *platformTolerations

  nats:
    resources:
      requests:
        cpu: "75m"
        memory: "30Mi"
      limits:
        cpu: "250m"
        memory: "100Mi"

  init:
    resources:
      requests:
        cpu: "75m"
        memory: "30Mi"
      limits:
        cpu: "250m"
        memory: "100Mi"

#################################
## Elasticsearch configuration
#################################
elasticsearch:
  # Common configuration
  common:
    persistence:
      enabled: true

  # Configure client nodes
  client:

    initResources:
      limits:
        cpu: "120m"
        memory: "100Mi"
      requests:
        cpu: "100m"
        memory: "80Mi"

    # Match resources.requests.memory
    heapMemory: "2g"

    resources:
      requests:
        cpu: "1"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "4Gi"

  # Configure data nodes
  data:

    initResources:
      limits:
        cpu: "120m"
        memory: "100Mi"
      requests:
        cpu: "100m"
        memory: "80Mi"

    # Match resources.requests.memory
    heapMemory: "2g"

    resources:
      requests:
        cpu: "1"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "4Gi"

    persistence:
      size: "100Gi"

  # Configure master nodes
  master:

    initResources:
      limits:
        cpu: "120m"
        memory: "100Mi"
      requests:
        cpu: "100m"
        memory: "80Mi"

    # Match resources.requests.memory
    heapMemory: "2g"

    resources:
      requests:
        cpu: "1"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "4Gi"

    persistence:
      size: "20Gi"

  exporter:
    resources:
      requests:
        cpu: "100m"
        memory: "100Mi"
      limits:
        cpu: "200m"
        memory: "128Mi"

  nginx:
    resources:
      requests:
        cpu: "80m"
        memory: "128Mi"
      limits:
        cpu: "100m"
        memory: "256Mi"

#################################
## Vector daemonset configuration
#################################
vector:    # pod
  vector:  # container
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1024Mi"
    # livenessProbe: {}
    # readinessProbe: {}

#################################
## Kube State configuration
#################################
kube-state:
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1024Mi"

#################################
## External Secrets configuration
#################################
external-secrets:
  enabled: false
