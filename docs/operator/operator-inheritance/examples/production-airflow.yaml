# =============================================================================
# Production-flavoured Airflow CR for the standalone Astro Runtime Operator
# =============================================================================
#
# This CR exercises:
#   • External PostgreSQL metadata DB + result backend (with SSL + pgbouncer)
#   • Remote logging — Elasticsearch over env vars (swap to S3/GCS easily)
#   • Statsd metrics + a Datadog sidecar that forwards to dogstatsd
#   • Prometheus scrape via extra NetworkPolicy ingress
#   • HA scheduler (2 replicas), pgbouncer (2 replicas)
#   • CeleryExecutor with KEDA autoscaling + a second worker queue
#   • A KubernetesExecutor task pod template (mounted via configmap)
#   • External secret manager via env vars (AWS Secrets Manager pattern)
#   • IRSA / Workload Identity via serviceAccountAnnotations
#   • Custom Airflow plugin via spec.airflowPlugins
#   • System (non-worker) component placement via systemNodeSelector
#   • Custom pod mutation hook
#   • Persistent task-log volume (for the KubernetesExecutor path)
#   • Custom anti-affinity (zone)
#
# Apply order:
#   1. Pre-create the Secrets / ConfigMap referenced below (see README.md).
#   2. Install cert-manager + the standalone operator helm chart.
#   3. kubectl apply -f production-airflow.yaml
#
# Field references throughout cite:
#   airflow-operator/apis/airflow/v1beta1/airflow_types.go
#   airflow-operator/apis/airflow/v1beta1/<component>_types.go
# =============================================================================

apiVersion: airflow.apache.org/v1beta1
kind: Airflow
metadata:
  name: prod-airflow
  namespace: airflow-prod                  # NB: pre-create this namespace
  annotations:
    # Operator-level scaling toggles — used by APC, harmless standalone.
    astronomer.io/enable-scaling: "false"
    astronomer.io/eligible-for-scaling: "false"
  labels:
    # Required when using AstroExecutor / Laminar (see consolidated-airflow-v3.yaml).
    # Harmless for Celery/Kubernetes executors.
    astronomer.io/deploymentId: "prod-airflow"

spec:
  # ---------------------------------------------------------------------------
  # IDENTITY & RUNTIME
  # ---------------------------------------------------------------------------
  executor: CeleryExecutor                  # one of Local/Celery/Kubernetes/Astro
  image: quay.io/astronomer/astro-runtime:13.7.0
  imagePullSecret: prod-airflow-registry    # pre-created docker-registry Secret
  runtimeVersion: "13.7.0"                  # MANDATORY — must match the image
  # antiAffinity = "zone" forces scheduler/webserver/pgbouncer across AZs
  # when replicas >= 2. (default "none"; we pick zone for HA.)
  antiAffinity: zone
  uid: 50000
  gid: 50000
  logRetentionDays: 15                      # local-FS log GC retention (sidecar)
  enableNetworkPolicies: true               # default in v1beta1 anyway
  inClusterPostgres: false                  # NEVER use the embedded postgres in prod

  # ---------------------------------------------------------------------------
  # METADATA DB / FERNET / SSL
  # ---------------------------------------------------------------------------
  # Pre-create these Secrets in the namespace. See README.md.
  secrets:
    metadataSecretName:        prod-airflow-metadata         # key: connection
    resultBackendSecretName:   prod-airflow-result-backend   # key: connection
    fernetKeySecretName:       prod-airflow-fernet-key       # key: fernet-key
    webserverSecretKeySecretName: prod-airflow-webserver-secret-key
    # Redis secrets — only required for CeleryExecutor
    redisConnectionSecretName: prod-airflow-redis-connection
    redisPasswordSecretName:   prod-airflow-redis-password
    pgbouncerConnectionSecretName: prod-airflow-pgbouncer-connection
  useExternallyManagedFernetKey: true       # we pre-create the Fernet Secret
  databaseSSLMode: verify-full              # require + verify TLS cert chain
  databaseSSLSecretName: prod-airflow-db-ca # CA cert at key "ca.crt"

  # ---------------------------------------------------------------------------
  # GLOBAL ENV (applied to every component unless overridden)
  # ---------------------------------------------------------------------------
  env:
    # ---- Remote logging — Elasticsearch (most common pattern) ----
    # For S3 instead, set:
    #   AIRFLOW__LOGGING__REMOTE_LOGGING=True
    #   AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER=s3://my-bucket/airflow-logs
    #   AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID=aws_default
    - name: AIRFLOW__LOGGING__REMOTE_LOGGING
      value: "True"
    - name: AIRFLOW__LOGGING__LOGGING_LEVEL
      value: "INFO"
    - name: AIRFLOW__ELASTICSEARCH__HOST
      valueFrom:
        secretKeyRef:
          name: prod-airflow-elasticsearch
          key: connection                     # e.g. https://elastic:pw@es.example.com:9243
    - name: AIRFLOW__ELASTICSEARCH__ELASTICSEARCH_HOST
      valueFrom:
        secretKeyRef:
          name: prod-airflow-elasticsearch
          key: connection
    - name: AIRFLOW__ELASTICSEARCH__JSON_FORMAT
      value: "True"
    - name: AIRFLOW__ELASTICSEARCH__WRITE_STDOUT
      value: "True"

    # ---- Statsd / metrics ----
    - name: AIRFLOW__METRICS__STATSD_ON
      value: "True"
    - name: AIRFLOW__METRICS__STATSD_HOST
      value: "prod-airflow-statsd"            # default operator-generated hostname
    - name: AIRFLOW__METRICS__STATSD_PORT
      value: "9125"
    - name: AIRFLOW__METRICS__STATSD_PREFIX
      value: "airflow"

    # ---- External secret backend (AWS Secrets Manager example) ----
    # Reads connections + variables from AWS Secrets Manager via boto3.
    - name: AIRFLOW__SECRETS__BACKEND
      value: "airflow.providers.amazon.aws.secrets.secrets_manager.SecretsManagerBackend"
    - name: AIRFLOW__SECRETS__BACKEND_KWARGS
      value: '{"connections_prefix":"airflow/connections","variables_prefix":"airflow/variables","region_name":"us-east-1"}'

    # ---- Core / scheduler / celery tuning (mirrors the APC 0.37 defaults) ----
    - name: AIRFLOW__CORE__LOAD_EXAMPLES
      value: "False"
    - name: AIRFLOW__CORE__PARALLELISM
      value: "32"
    - name: AIRFLOW__SCHEDULER__PARSING_PROCESSES
      value: "2"
    - name: AIRFLOW__SCHEDULER__CATCHUP_BY_DEFAULT
      value: "False"
    - name: AIRFLOW__SCHEDULER__STANDALONE_DAG_PROCESSOR
      value: "false"
    - name: AIRFLOW__CELERY__WORKER_CONCURRENCY
      value: "16"
    - name: AIRFLOW__WEBSERVER__WORKERS
      value: "4"
    - name: AIRFLOW__WEBSERVER__UPDATE_FAB_PERMS
      value: "True"
    - name: AIRFLOW__TRIGGERER__DEFAULT_CAPACITY
      value: "1000"

  # ---------------------------------------------------------------------------
  # IAM / SERVICE ACCOUNT ANNOTATIONS  (IRSA / Workload Identity)
  # ---------------------------------------------------------------------------
  # Applied to every component's ServiceAccount. EKS IRSA shown; for GKE use
  # iam.gke.io/gcp-service-account: ...
  serviceAccountAnnotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/prod-airflow"

  # ---------------------------------------------------------------------------
  # SYSTEM (non-worker) NODE PLACEMENT
  # ---------------------------------------------------------------------------
  systemNodeSelector:
    node-pool: airflow-system
  systemTolerations:
    - key: dedicated
      operator: Equal
      value: airflow-system
      effect: NoSchedule

  # ---------------------------------------------------------------------------
  # LOCAL SETTINGS  (custom pod mutation hook)
  # ---------------------------------------------------------------------------
  # Stamps every K8s-launched pod with team/cost-center labels. Replace with
  # your own logic. Goes into airflow_local_settings.py.
  localSettings:
    enableAstroPodMutationHook: false
    customPodMutationHook: |-
      def pod_mutation_hook(pod):
          pod.metadata.labels = pod.metadata.labels or {}
          pod.metadata.labels['team'] = 'data-platform'
          pod.metadata.labels['cost-center'] = 'cc-1234'
    extra: ""

  # ---------------------------------------------------------------------------
  # AIRFLOW PLUGINS
  # ---------------------------------------------------------------------------
  # Init-container copies the plugin from a plugin image into the airflow pods.
  # See airflow_types.go:330-354.
  airflowPlugins:
    - name: company-internal-plugin
      image: ghcr.io/example/airflow-internal-plugin:1.2.0
      sourcePath: /plugins/
      destinationPath: /usr/local/airflow/plugins/
      pythonPath: /usr/local/airflow/plugins/
      airflowComponents:
        - scheduler
        - triggerer
        - worker
        - webserver

  # ---------------------------------------------------------------------------
  # KUBERNETESEXECUTOR — custom task pod template (only used if executor is K8s
  # or if some tasks use KubernetesExecutor via celery_kubernetes_executor).
  # ---------------------------------------------------------------------------
  podTemplateConfigMapName: prod-airflow-kexec-pod-template

  # ---------------------------------------------------------------------------
  # TASK-LOG PVC (only relevant for KubernetesExecutor without remote logging)
  # If you have remote logging configured (we do, above), you can drop this.
  # ---------------------------------------------------------------------------
  logs:
    persistentVolumeClaimSpec:
      accessModes: ["ReadWriteMany"]
      resources:
        requests:
          storage: 50Gi
      storageClassName: efs-sc                  # any RWX storage class

  # ---------------------------------------------------------------------------
  # SHARED TASK-DATA VOLUME (cross-task data sharing for KExec / triggerer)
  # ---------------------------------------------------------------------------
  dataVolume:
    persistentVolumeClaimSpec:
      accessModes: ["ReadWriteMany"]
      resources:
        requests:
          storage: 20Gi
      storageClassName: efs-sc

  # ---------------------------------------------------------------------------
  # RBAC — narrow as needed; defaults are usually fine.
  # ---------------------------------------------------------------------------
  rbac:
    allowWorkerPodLaunching: true              # required for KExec tasks
    allowTriggererPodLogReading: true          # required for deferrable ops
    allowWebserverPodLogReading: true

  # ---------------------------------------------------------------------------
  # WEBSERVER
  # ---------------------------------------------------------------------------
  webserver:
    replicas: 2
    createDefaultUser: false                   # NEVER true in production
    servingPort: 8080
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8080"
    extraNetworkPolicyRules:
      ingress:
        - ports:
            - protocol: TCP
              port: 8080
          from:
            # Allow nginx-ingress (adjust to your ingress controller's labels)
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: ingress-nginx
              podSelector:
                matchLabels:
                  app.kubernetes.io/name: ingress-nginx
    podTemplateSpec:
      spec:
        containers:
          - name: webserver
            resources:
              requests:
                cpu: "500m"
                memory: "1920Mi"
                ephemeral-storage: "1Gi"
              limits:
                cpu: "1"
                memory: "1920Mi"
                ephemeral-storage: "2Gi"
    # If you want the operator-generated Ingress (host-based), uncomment:
    # ingress:
    #   host: airflow.example.com
    #   path: /
    #   tlsSecretName: prod-airflow-tls

  # ---------------------------------------------------------------------------
  # SCHEDULER (HA)
  # ---------------------------------------------------------------------------
  scheduler:
    replicas: 2                                # HA — anti-affinity from spec.antiAffinity=zone
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8793"
    podTemplateSpec:
      spec:
        containers:
          - name: scheduler
            resources:
              requests:
                cpu: "1"
                memory: "2Gi"
              limits:
                cpu: "2"
                memory: "4Gi"

  # ---------------------------------------------------------------------------
  # TRIGGERER (for deferrable operators)
  # ---------------------------------------------------------------------------
  triggerer:
    replicas: 1
    podTemplateSpec:
      spec:
        containers:
          - name: triggerer
            resources:
              requests:
                cpu: "500m"
                memory: "1920Mi"
              limits:
                cpu: "1"
                memory: "1920Mi"

  # ---------------------------------------------------------------------------
  # DAG PROCESSOR (standalone DAG parsing — leave disabled if scheduler parses)
  # ---------------------------------------------------------------------------
  dagProcessor:
    enabled: false

  # ---------------------------------------------------------------------------
  # WORKERS — two Celery queues with KEDA autoscaling.
  # ---------------------------------------------------------------------------
  useDefaultWorker: false                      # we define our own queues
  workers:
    - queueName: default
      isDefaultWorker: true
      executor: CeleryExecutor
      concurrency: 16
      keda:
        enabled: true
        minWorkers: 2                          # always keep two warm
        maxWorkers: 20
        pollingInterval: 10
        cooldownPeriod: 300
      podTemplateSpec:
        spec:
          containers:
            - name: worker
              resources:
                requests:
                  cpu: "1"
                  memory: "3840Mi"
                limits:
                  cpu: "2"
                  memory: "3840Mi"

    - queueName: high-mem                       # heavy-job queue
      isDefaultWorker: false
      executor: CeleryExecutor
      concurrency: 4
      keda:
        enabled: true
        minWorkers: 0
        maxWorkers: 8
        pollingInterval: 10
        cooldownPeriod: 600
      podTemplateSpec:
        spec:
          nodeSelector:
            node-pool: airflow-high-mem
          tolerations:
            - key: dedicated
              operator: Equal
              value: airflow-high-mem
              effect: NoSchedule
          containers:
            - name: worker
              resources:
                requests:
                  cpu: "2"
                  memory: "16Gi"
                limits:
                  cpu: "4"
                  memory: "16Gi"

  # ---------------------------------------------------------------------------
  # REDIS  (only for CeleryExecutor)
  # ---------------------------------------------------------------------------
  redis:
    replicas: 1
    image: quay.io/astronomer/ap-redis:7.4.3
    resources:
      requests:
        cpu: "200m"
        memory: "768Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

  # ---------------------------------------------------------------------------
  # PGBOUNCER  (production pool sizing + TLS to DB)
  # ---------------------------------------------------------------------------
  pgbouncer:
    enabled: true
    replicas: 2
    maxClientConn: 300                         # tune to fleet size
    metadataPoolSize: 24
    resultBackendPoolSize: 12
    clientSSLMode: prefer                      # client (airflow) <-> pgbouncer
    sslmode: verify-full                       # pgbouncer <-> Postgres
    enableNetworkPolicies: true
    resources:
      requests:
        cpu: "200m"
        memory: "768Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

  # ---------------------------------------------------------------------------
  # STATSD + metrics forwarding sidecar (Datadog example)
  # ---------------------------------------------------------------------------
  # The Datadog Agent itself runs as a DaemonSet at the cluster level; this
  # sidecar pattern only forwards from our statsd to dogstatsd. For pure
  # Prometheus scraping the sidecar isn't needed — just enable scrape with the
  # podAnnotations + NetworkPolicy below.
  statsd:
    enabled: true
    replicas: 1
    ingestPort: 9125
    scrapePort: 9102
    enableNetworkPolicies: true
    customLabels:
      app.kubernetes.io/part-of: airflow
    extraNetworkPolicyRules:
      ingress:
        - ports:
            - protocol: TCP
              port: 9102
          from:
            # Allow Prometheus to scrape /metrics on 9102.
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: monitoring
              podSelector:
                matchLabels:
                  app.kubernetes.io/name: prometheus
    podTemplateSpec:
      metadata:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "9102"
      spec:
        containers:
          - name: statsd
            resources:
              requests:
                cpu: "200m"
                memory: "768Mi"
              limits:
                cpu: "500m"
                memory: "1Gi"
          # --- Datadog forwarder sidecar ---
          # Reads from the operator's statsd (UDP 9125) and forwards to the
          # node-local datadog agent on UDP 8125.
          - name: datadog-forwarder
            image: socat:latest                  # placeholder — use your own
            args:
              - "UDP-RECV:9125,reuseaddr,fork"
              - "UDP-SENDTO:127.0.0.1:8125"
            resources:
              requests:
                cpu: "50m"
                memory: "64Mi"
              limits:
                cpu: "100m"
                memory: "128Mi"
